<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise Semanal IM - Adaptado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.1.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --ink: #000000;
  --ink-2: #1a1a1a;
  --ink-3: #333333;
  --ink-4: #555555;
  --paper: #ffffff;
  --paper-2: #f8f9fa;
  --paper-3: #f1f3f5;
  --line: #d1d1d1;
  --line-2: #b1b1b1;
  --n1: #ff2222; --n1-bg: #fff2f2;
  --n2: #ff7b00; --n2-bg: #fff3e6;
  --n3: #228b22; --n3-bg: #f0faf0; /* Verde para N3/Bom desempenho */
  --bar-blue: #2b2fd8;
  --bar-orange: #d8722a;
  --bar-track: #e4e4e8;
  --btn-border: #b1b1b1;
  --btn-text: #222;
  --shadow: 0 1px 4px rgba(0,0,0,.06), 0 2px 12px rgba(0,0,0,.04);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}
.header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,.98);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
  padding: 0 32px;
  height: 62px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: #1c1c2e;
  display: flex; align-items: center; justify-content: center;
}
.header-icon svg { width: 18px; height: 18px; fill: #fff; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--ink); letter-spacing: -0.2px; white-space: nowrap; }
.header-badge {
  padding: 5px 14px; border-radius: 99px;
  background: #f1f3f5; border: 1px solid var(--line-2);
  font-size: 12px; font-weight: 500; color: var(--ink-2); white-space: nowrap;
}
.main { max-width: 1320px; margin: 0 auto; padding: 28px 24px 64px; }
.home-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: 14px; padding: 20px 20px 16px;
  box-shadow: var(--shadow);
  display: flex; flex-direction: column; gap: 6px;
  align-items: center; text-align: center;
}
.stat-card-label { font-size: 12px; font-weight: 800; letter-spacing: 0.7px; text-transform: uppercase; color: var(--ink-4); }
.stat-card-val { font-family: 'DM Serif Display', serif; font-size: 42px; line-height: 1; color: var(--ink); }
.stat-card-sub { font-size: 13px; color: var(--ink-4); margin-top: 2px; font-weight: 600; }
.stat-card.accent-red .stat-card-val { color: var(--n1); }
.stat-card.accent-amber .stat-card-val { color: var(--n2); }
.stat-card.accent-green .stat-card-val { color: var(--n3); }
.stat-card.accent-blue .stat-card-val { color: var(--bar-blue); }

.home-table { background: #fff; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); }
.ht-head {
  display: grid;
  grid-template-columns: 76px 210px 1fr 180px 110px 136px;
  background: #f1f3f5; border-bottom: 1px solid var(--line);
}
.ht-th {
  padding: 14px 12px; font-size: 13px; font-weight: 800;
  letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink);
  text-align: center; border-right: 1px solid var(--line);
  white-space: nowrap;
}
.ht-th.left { text-align: left; padding-left: 16px; }
.ht-row {
  display: grid;
  grid-template-columns: 76px 210px 1fr 180px 110px 136px;
  border-bottom: 1px solid var(--line);
  transition: background 0.12s;
  cursor: pointer;
}
.ht-td { display: flex; align-items: center; justify-content: center; padding: 12px; border-right: 1px solid var(--line); }
.ht-td.left { justify-content: flex-start; padding-left: 16px; }
.ht-td:last-child { border-right: none; }

.rank-pill { padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
.pill-n1 { background: var(--n1-bg); color: var(--n1); }
.pill-n2 { background: var(--n2-bg); color: var(--n2); }
.pill-n3 { background: var(--n3-bg); color: var(--n3); }

.mini-prog { width: 100%; display: flex; flex-direction: column; gap: 4px; }
.mini-track { height: 6px; border-radius: 99px; background: var(--bar-track); overflow: hidden; flex: 1; }
.mini-fill { height: 100%; border-radius: 99px; transition: width 0.6s; }
.fill-blue { background: var(--bar-blue); }
.mini-pct { font-size: 13px; font-weight: 800; min-width: 38px; text-align: right; }

.btn-detail {
  padding: 6px 12px; border-radius: 7px; border: 1px solid var(--line-2);
  background: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
}

/* Detail Screen */
.detail-screen { display: none; }
.detail-screen.active { display: block; }
.btn-back {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 7px;
  border: 1px solid var(--line-2); background: var(--paper-3); font-size: 13px; font-weight: 600;
  cursor: pointer; margin-bottom: 20px;
}

.loja-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 24px; box-shadow: var(--shadow); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.loja-title { font-family: 'DM Serif Display', serif; font-size: 28px; }
.loja-meta { color: var(--ink-4); font-size: 14px; }

.metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
.metric-box { background: var(--paper-2); padding: 16px; border-radius: 12px; text-align: center; }
.metric-label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); margin-bottom: 8px; }
.metric-value { font-size: 32px; font-weight: 700; }

.sec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.sec-card { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
.sec-card-head { padding: 12px; background: var(--paper-3); font-weight: 700; display: flex; justify-content: space-between; }
.sec-card-body { padding: 16px; }
.subarea-item { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; border-bottom: 1px solid #eee; }
.subarea-item:last-child { border-bottom: none; }

.loading { padding: 64px; text-align: center; font-size: 18px; color: var(--ink-4); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    </div>
    <div>
      <div class="header-title">Dashboard Operacional IM</div>
    </div>
  </div>
  <div class="header-badge" id="periodo">A carregar...</div>
</div>

<div class="main">
  <div id="home-screen" class="home-screen">
    <div class="loading">A carregar dados...</div>
  </div>

  <div id="detail-screen" class="detail-screen">
    <button class="btn-back" onclick="goHome()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Voltar
    </button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
let _data = null;
let _lojas = [];

function fmt(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
function pillCls(n) { return n === 'N1' ? 'pill-n1' : n === 'N2' ? 'pill-n2' : 'pill-n3'; }

async function loadData() {
  try {
    // Tenta carregar o arquivo dados.json. Se não existir, avisa.
    const response = await fetch('dados.json?t=' + Date.now());
    if (!response.ok) throw new Error('Arquivo dados.json não encontrado');
    _data = await response.json();
    _lojas = _data.lojas || [];
    
    document.getElementById('periodo').textContent = 'Atualizado em: ' + new Date(_data.atualizadoEm).toLocaleString();
    renderHome();
  } catch (e) {
    document.getElementById('home-screen').innerHTML = `<div class="loading" style="color:red">Erro: ${e.message}<br><small>Certifique-se que o ficheiro dados.json está no mesmo diretório.</small></div>`;
  }
}

function renderHome() {
  const n1 = _lojas.filter(l => l.nivel === 'N1').length;
  const n2 = _lojas.filter(l => l.nivel === 'N2').length;
  const n3 = _lojas.filter(l => l.nivel === 'N3').length;

  let html = `
    <div class="home-stats">
      <div class="stat-card">
        <div class="stat-card-label">Total de Lojas</div>
        <div class="stat-card-val">${_lojas.length}</div>
        <div class="stat-card-sub">Em monitorização</div>
      </div>
      <div class="stat-card accent-red">
        <div class="stat-card-label">Nível 1 (Crítico)</div>
        <div class="stat-card-val">${n1}</div>
        <div class="stat-card-sub">Ação imediata</div>
      </div>
      <div class="stat-card accent-amber">
        <div class="stat-card-label">Nível 2 (Atenção)</div>
        <div class="stat-card-val">${n2}</div>
        <div class="stat-card-sub">Monitorização</div>
      </div>
      <div class="stat-card accent-green">
        <div class="stat-card-label">Nível 3 (Bom)</div>
        <div class="stat-card-val">${n3}</div>
        <div class="stat-card-sub">Conforme</div>
      </div>
    </div>

    <div class="home-table">
      <div class="ht-head">
        <div class="ht-th">#</div>
        <div class="ht-th left">Loja</div>
        <div class="ht-th">Progresso Global</div>
        <div class="ht-th">Tarefas</div>
        <div class="ht-th">Estado</div>
        <div class="ht-th">Ação</div>
      </div>
      <div id="ht-body">
        ${_lojas.map((l, i) => `
          <div class="ht-row" onclick="goDetail(${i})">
            <div class="ht-td">
              <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
                <span style="font-family:'DM Serif Display';font-size:20px">${i+1}</span>
                <span class="rank-pill ${pillCls(l.nivel)}">${l.nivel}</span>
              </div>
            </div>
            <div class="ht-td left">
              <div style="font-weight:700">${l.nome}</div>
            </div>
            <div class="ht-td">
              <div class="mini-prog">
                <div style="display:flex;align-items:center;gap:8px">
                  <div class="mini-track"><div class="mini-fill fill-blue" style="width:${l.taxa}%"></div></div>
                  <span class="mini-pct">${l.taxa}%</span>
                </div>
              </div>
            </div>
            <div class="ht-td">
              <div style="font-size:13px;text-align:center">
                <b>${fmt(l.totais.fechadas)}</b> fechadas<br>
                <span style="color:#888">${fmt(l.totais.total)} total</span>
              </div>
            </div>
            <div class="ht-td">
              <span style="font-size:12px;font-weight:700;color:${l.nivel === 'N1' ? 'var(--n1)' : l.nivel === 'N2' ? 'var(--n2)' : 'var(--n3)'}">
                ${l.nivel === 'N1' ? 'CRÍTICO' : l.nivel === 'N2' ? 'ATENÇÃO' : 'CONFORME'}
              </span>
            </div>
            <div class="ht-td">
              <button class="btn-detail">Detalhes</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('home-screen').innerHTML = html;
  document.getElementById('home-screen').style.display = 'block';
  document.getElementById('detail-screen').style.display = 'none';
}

function goDetail(idx) {
  const l = _lojas[idx];
  let html = `
    <div class="loja-card">
      <div class="card-header">
        <div>
          <div class="loja-title">${l.nome}</div>
          <div class="loja-meta">Classificação: <span class="rank-pill ${pillCls(l.nivel)}">${l.nivel}</span></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:32px;font-weight:700;color:var(--bar-blue)">${l.taxa}%</div>
          <div style="font-size:12px;font-weight:800;color:var(--ink-4)">TAXA DE CONFORMIDADE</div>
        </div>
      </div>

      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-label">Total de Tarefas</div>
          <div class="metric-value">${fmt(l.totais.total)}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Fechadas</div>
          <div class="metric-value" style="color:var(--bar-blue)">${fmt(l.totais.fechadas)}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Por Fechar</div>
          <div class="metric-value" style="color:var(--n1)">${fmt(l.totais.porFechar)}</div>
        </div>
      </div>

      <h3 style="margin-bottom:16px;font-family:'DM Serif Display'">Distribuição por Áreas</h3>
      <div class="sec-grid">
        ${l.areas.map(a => `
          <div class="sec-card">
            <div class="sec-card-head">
              <span>${a.area}</span>
              <span style="color:${a.taxa < 80 ? 'var(--n1)' : 'var(--ink-2)'}">${a.taxa}%</span>
            </div>
            <div class="sec-card-body">
              ${a.subareas.map(s => `
                <div class="subarea-item">
                  <span>${s.subarea}</span>
                  <span><b>${s.fechadas}</b> / ${s.total}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('detail-screen').style.display = 'block';
  window.scrollTo(0,0);
}

function goHome() {
  renderHome();
}

window.onload = loadData;
</script>

</body>
</html>
