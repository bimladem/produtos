<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard HACCP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #111111;
  --ink-2:  #2a2a2a;
  --ink-3:  #4a4a4a;
  --ink-4:  #888888;
  --paper:  #fafaf8;
  --card:   #ffffff;
  --line:   #e4e2dc;
  --line-2: #ccc9c0;

  /* Níveis — invertidos para HACCP: alto % = bom */
  --n1:    #16a34a; --n1-bg: #f0fdf4; /* Verde   ≥ 95% */
  --n2:    #d97706; --n2-bg: #fffbeb; /* Âmbar   80–94% */
  --n3:    #dc2626; --n3-bg: #fef2f2; /* Vermelho < 80% */

  --blue:   #2563eb;
  --track:  #e8e6df;
  --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04);
  --radius: 12px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: sticky; top:0; z-index:200;
  background: rgba(250,250,248,.97);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  padding: 0 32px; height: 60px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.header-left { display:flex; align-items:center; gap:10px; }
.header-icon {
  width:34px; height:34px; border-radius:8px;
  background:#1c1c2e;
  display:flex; align-items:center; justify-content:center;
}
.header-icon svg { width:17px; height:17px; fill:#fff; }
.header-title {
  font-family:'DM Serif Display', serif;
  font-size:18px; color:var(--ink); letter-spacing:-.2px;
}
.header-sub { font-size:12px; color:var(--ink-4); margin-top:1px; }
.header-date {
  padding:5px 14px; border-radius:99px;
  background:#f1efe8; border:1px solid var(--line-2);
  font-size:12px; font-weight:600; color:var(--ink-3); white-space:nowrap;
}
.btn-back {
  display:none; align-items:center; gap:6px;
  padding:5px 12px; border-radius:7px;
  border:1px solid var(--line-2); background:transparent;
  font-size:13px; font-weight:600; color:var(--ink-3);
  cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s;
}
.btn-back:hover { background:var(--line); color:var(--ink); }
.btn-back.vis { display:flex; }

/* ── LAYOUT ── */
.main { max-width:1280px; margin:0 auto; padding:28px 24px 80px; }

/* ── STATS ROW ── */
.stats-row {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap:10px; margin-bottom:22px;
}
.stat {
  background:var(--card); border:1px solid var(--line);
  border-radius:var(--radius); padding:18px 16px;
  box-shadow:var(--shadow); text-align:center;
}
.stat-lbl { font-size:11px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-4); margin-bottom:6px; }
.stat-val {
  font-family:'DM Serif Display',serif;
  font-size:38px; line-height:1; color:var(--ink);
}
.stat-sub { font-size:12px; color:var(--ink-4); margin-top:4px; font-weight:500; }
.stat.c-green .stat-val { color:var(--n1); }
.stat.c-amber  .stat-val { color:var(--n2); }
.stat.c-red    .stat-val { color:var(--n3); }
.stat.c-blue   .stat-val { color:var(--blue); }

/* ── FILTER BAR ── */
.fbar {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  margin-bottom:16px;
}
.fbar-lbl { font-size:13px; font-weight:700; color:var(--ink-3); margin-right:4px; }
.fbtn {
  padding:5px 15px; border-radius:99px;
  border:1px solid var(--line-2); background:var(--card);
  font-size:12.5px; font-weight:600; color:var(--ink-4);
  cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; white-space:nowrap;
}
.fbtn:hover { border-color:var(--ink-3); color:var(--ink); }
.fbtn.on { background:var(--ink); border-color:var(--ink); color:#fff; }

/* ── TABLE SHELL ── */
.htable {
  background:var(--card); border:1px solid var(--line);
  border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);
}
.ht-head {
  display:grid;
  grid-template-columns: 64px 1fr 140px 160px 100px 120px;
  background:#f1efe8; border-bottom:1px solid var(--line);
}
.ht-th {
  padding:12px 14px; font-size:11.5px; font-weight:800;
  letter-spacing:.5px; text-transform:uppercase; color:var(--ink-3);
  text-align:center; border-right:1px solid var(--line);
}
.ht-th:last-child { border-right:none; }
.ht-th.left { text-align:left; }

.ht-row {
  display:grid;
  grid-template-columns: 64px 1fr 140px 160px 100px 120px;
  border-bottom:1px solid var(--line);
  cursor:pointer; transition:background .12s;
}
.ht-row:last-child { border-bottom:none; }
.ht-row:hover { background:#f5f3ec; }

.ht-td {
  padding:16px 14px; display:flex; align-items:center; justify-content:center;
  border-right:1px solid var(--line); font-size:14px; font-weight:500; color:var(--ink);
}
.ht-td:last-child { border-right:none; }
.ht-td.left { justify-content:flex-start; }

.rank-td { background:#f1efe8; flex-direction:column; gap:5px; }
.rank-n  { font-family:'DM Serif Display',serif; font-size:24px; color:var(--ink-2); line-height:1; }
.npill   { padding:3px 9px; border-radius:99px; font-size:11px; font-weight:700; }
.n1p { background:var(--n1-bg); color:var(--n1); }
.n2p { background:var(--n2-bg); color:var(--n2); }
.n3p { background:var(--n3-bg); color:var(--n3); }

.nome-td { flex-direction:column; align-items:flex-start; gap:2px; }
.loja-nome { font-size:15px; font-weight:700; color:var(--ink); }

/* progress mini */
.mprog { display:flex; flex-direction:column; gap:3px; width:100%; }
.mrow  { display:flex; align-items:center; gap:7px; }
.mtrack { flex:1; height:6px; background:var(--track); border-radius:99px; overflow:hidden; }
.mfill  { height:100%; border-radius:99px; transition:width .5s; }
.fg     { background:var(--n1); }
.fa     { background:var(--n2); }
.fr     { background:var(--n3); }
.mpct   { font-size:12px; font-weight:700; min-width:34px; text-align:right; }

.btn-det {
  padding:6px 12px; border-radius:7px;
  border:1px solid var(--line-2); background:transparent;
  font-size:12px; font-weight:700; color:var(--ink-3);
  cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:5px;
}
.btn-det:hover { background:var(--ink); color:#fff; border-color:var(--ink); }

/* ── BOTTOM LEGEND ── */
.legend-strip {
  display:flex; gap:22px; flex-wrap:wrap; align-items:center;
  margin-top:16px;
  padding:10px 18px; background:var(--card);
  border:1px solid var(--line); border-radius:var(--radius);
  font-size:13px;
}
.li { display:flex; align-items:center; gap:7px; }
.ld { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

/* ── DETAIL SCREEN ── */
#detail-screen { display:none; }
#detail-screen.vis { display:block; }

.d-card {
  background:var(--card); border:1px solid var(--line);
  border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);
  margin-bottom:20px;
}
.d-head {
  display:grid; grid-template-columns:60px auto 1fr auto;
  align-items:stretch; min-height:80px;
}
.d-rank {
  background:#f1efe8; border-right:1px solid var(--line);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:14px 8px; gap:6px; text-align:center;
}
.d-id {
  padding:16px 20px; border-right:1px solid var(--line);
  display:flex; flex-direction:column; justify-content:center; gap:2px;
}
.d-nome { font-size:18px; font-weight:700; }
.d-stats {
  display:flex; align-items:center; padding:0 20px; gap:0;
  border-right:1px solid var(--line); flex:1;
}
.dstat {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:14px 18px; border-right:1px solid var(--line); flex:1;
  gap:2px;
}
.dstat:last-child { border-right:none; }
.dstat-lbl { font-size:10.5px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; color:var(--ink-4); }
.dstat-val { font-size:22px; font-weight:700; color:var(--ink); }
.dstat.hl .dstat-val { color:var(--blue); }

.d-right {
  padding:14px 20px;
  display:flex; flex-direction:column; justify-content:center; gap:10px;
  min-width:200px;
}
.prog-row { display:flex; flex-direction:column; gap:3px; }
.pr-lbl { display:flex; justify-content:space-between; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-4); }
.pr-pct { font-size:13px; font-weight:800; color:var(--ink-2); }
.pr-track { height:6px; border-radius:99px; background:var(--track); overflow:hidden; }
.pr-fill { height:100%; border-radius:99px; transition:width .6s; }

/* Areas grid */
.area-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
  gap:10px; padding:20px; background:#f8f7f3;
  border-top:1px solid var(--line);
}
.area-card {
  background:var(--card); border:1px solid var(--line);
  border-radius:10px; overflow:hidden;
}
.area-head {
  padding:10px 14px; background:#f1efe8;
  border-bottom:1px solid var(--line);
  display:flex; justify-content:space-between; align-items:center;
}
.area-nome { font-size:13px; font-weight:700; color:var(--ink); }
.area-body { padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
.sub-row { display:flex; flex-direction:column; gap:3px; }
.sub-nome { font-size:12px; color:var(--ink-3); font-weight:500; }
.sub-bar { height:5px; border-radius:99px; background:var(--track); overflow:hidden; }
.sub-fill { height:100%; border-radius:99px; }
.sub-meta {
  display:flex; justify-content:space-between;
  font-size:11px; color:var(--ink-4); font-weight:600;
}

.loading {
  padding:60px; text-align:center;
  font-size:15px; font-weight:600; color:var(--ink-4);
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="btn-back" id="btn-back" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Voltar
    </button>
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="17" y="5" width="4" height="16" rx="1"/></svg>
    </div>
    <div>
      <div class="header-title" id="h-title">Dashboard HACCP</div>
      <div class="header-sub"  id="h-sub">A carregar…</div>
    </div>
  </div>
  <div class="header-date" id="h-date">—</div>
</header>

<main class="main">
  <div id="home-screen"><div class="loading">A carregar dados…</div></div>
  <div id="detail-screen"></div>
</main>

<script>
var _lojas = [];
var _filter = 'all';

/* ────────────────── helpers ────────────────── */
function nc(n){ return n==='N1'?'n1p':n==='N2'?'n2p':'n3p'; }
function fillCls(t){ return t>=95?'fg':t>=80?'fa':'fr'; }
function fmt(n){ return Number(n).toLocaleString('pt-PT'); }
function arrow(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
}

/* ────────────────── navigation ────────────────── */
function goHome(){
  document.getElementById('home-screen').style.display='';
  document.getElementById('detail-screen').style.display='none';
  document.getElementById('detail-screen').classList.remove('vis');
  document.getElementById('btn-back').classList.remove('vis');
  document.getElementById('h-title').textContent='Dashboard HACCP';
  document.getElementById('h-sub').textContent=_lojas.length+' lojas monitorizadas';
}

function goDetail(idx){
  document.getElementById('home-screen').style.display='none';
  document.getElementById('detail-screen').style.display='block';
  document.getElementById('detail-screen').classList.add('vis');
  document.getElementById('btn-back').classList.add('vis');
  var l=_lojas[idx];
  document.getElementById('h-title').textContent=l.nome;
  document.getElementById('h-sub').textContent='Taxa global: '+l.taxa+'%  ·  '+l.nivel;
  renderDetail(l, idx);
  window.scrollTo(0,0);
}

/* ────────────────── filter ────────────────── */
function setF(f){
  _filter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.toggle('on', b.dataset.f===f); });
  renderRows();
}

/* ────────────────── load data ────────────────── */
fetch('Dados.json?t='+Date.now())
  .then(function(r){ return r.json(); })
  .then(function(json){
    _lojas = (json.lojas||[]).slice().sort(function(a,b){
      // N1 first, then by taxa desc
      var order={'N1':0,'N2':1,'N3':2};
      if(order[a.nivel]!==order[b.nivel]) return order[a.nivel]-order[b.nivel];
      return b.taxa-a.taxa;
    });

    var dt = json.atualizadoEm ? new Date(json.atualizadoEm) : null;
    var dtStr = dt ? dt.toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    document.getElementById('h-date').textContent='📅 '+dtStr;
    document.getElementById('h-sub').textContent=_lojas.length+' lojas monitorizadas';

    renderHome();
  })
  .catch(function(e){
    document.getElementById('home-screen').innerHTML='<div class="loading" style="color:var(--n3)">Erro ao carregar Dados.json: '+e.message+'</div>';
  });

/* ────────────────── home ────────────────── */
function renderHome(){
  var n1=_lojas.filter(function(l){return l.nivel==='N1';}).length;
  var n2=_lojas.filter(function(l){return l.nivel==='N2';}).length;
  var n3=_lojas.filter(function(l){return l.nivel==='N3';}).length;

  var totFech=_lojas.reduce(function(s,l){return s+l.totais.fechadas;},0);
  var totTot =_lojas.reduce(function(s,l){return s+l.totais.total;},0);
  var taxaG  = totTot>0?Math.round(totFech/totTot*100):0;

  var html='';

  /* stats */
  html+='<div class="stats-row">';
  html+=sc('Lojas', _lojas.length, 'monitorizadas', '');
  html+=sc('Taxa Global', taxaG+'%', fmt(totFech)+' / '+fmt(totTot), 'c-blue');
  html+=sc('N1 — Excelente', n1, '≥ 95% fechadas', 'c-green');
  html+=sc('N2 — Suficiente', n2, '80–94% fechadas', 'c-amber');
  html+=sc('N3 — Crítico', n3, '< 80% fechadas', 'c-red');
  html+='</div>';

  /* filter bar */
  html+='<div class="fbar"><span class="fbar-lbl">Filtrar:</span>';
  html+='<button class="fbtn on" data-f="all" onclick="setF(\'all\')">Todas ('+_lojas.length+')</button>';
  html+='<button class="fbtn" data-f="N1" onclick="setF(\'N1\')">✅ N1 ('+n1+')</button>';
  html+='<button class="fbtn" data-f="N2" onclick="setF(\'N2\')">⚠️ N2 ('+n2+')</button>';
  html+='<button class="fbtn" data-f="N3" onclick="setF(\'N3\')">🔴 N3 ('+n3+')</button>';
  html+='</div>';

  /* table */
  html+='<div class="htable">';
  html+='<div class="ht-head">';
  html+='<div class="ht-th">#</div>';
  html+='<div class="ht-th left">Loja</div>';
  html+='<div class="ht-th">Fechadas</div>';
  html+='<div class="ht-th">Progresso</div>';
  html+='<div class="ht-th">Nível</div>';
  html+='<div class="ht-th">Detalhe</div>';
  html+='</div>';
  html+='<div id="ht-body"></div>';
  html+='</div>';

  /* legend */
  html+='<div class="legend-strip">';
  html+='<span style="font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-4)">Níveis:</span>';
  html+='<div class="li"><div class="ld" style="background:var(--n1)"></div><strong style="color:var(--n1)">N1</strong> ≥ 95% tarefas fechadas</div>';
  html+='<div class="li"><div class="ld" style="background:var(--n2)"></div><strong style="color:var(--n2)">N2</strong> 80–94% tarefas fechadas</div>';
  html+='<div class="li"><div class="ld" style="background:var(--n3)"></div><strong style="color:var(--n3)">N3</strong> &lt; 80% tarefas fechadas</div>';
  html+='</div>';

  document.getElementById('home-screen').innerHTML=html;
  renderRows();
}

function sc(lbl,val,sub,cls){
  return '<div class="stat '+cls+'"><div class="stat-lbl">'+lbl+'</div><div class="stat-val">'+val+'</div><div class="stat-sub">'+sub+'</div></div>';
}

function renderRows(){
  var filtered=_lojas.filter(function(l){
    if(_filter==='all') return true;
    return l.nivel===_filter;
  });

  if(!filtered.length){
    document.getElementById('ht-body').innerHTML='<div style="padding:32px;text-align:center;color:var(--ink-4)">Sem lojas para este filtro.</div>';
    return;
  }

  var html='';
  filtered.forEach(function(l){
    var idx=_lojas.indexOf(l);
    var fc=fillCls(l.taxa);
    html+='<div class="ht-row" onclick="goDetail('+idx+')">';

    /* rank */
    html+='<div class="ht-td rank-td">';
    html+='<span class="rank-n">'+(idx+1)+'</span>';
    html+='<span class="npill '+nc(l.nivel)+'">'+l.nivel+'</span>';
    html+='</div>';

    /* nome */
    html+='<div class="ht-td left nome-td">';
    html+='<span class="loja-nome">'+l.nome+'</span>';
    html+='<span style="font-size:12px;color:var(--ink-4)">'+fmt(l.totais.total)+' tarefas no total</span>';
    html+='</div>';

    /* fechadas */
    html+='<div class="ht-td" style="flex-direction:column;gap:2px">';
    html+='<span style="font-size:20px;font-weight:700;color:var(--ink)">'+fmt(l.totais.fechadas)+'</span>';
    html+='<span style="font-size:12px;color:var(--ink-4)">'+fmt(l.totais.porFechar)+' por fechar</span>';
    html+='</div>';

    /* progress */
    html+='<div class="ht-td"><div class="mprog">';
    html+='<div class="mrow"><div class="mtrack"><div class="mfill '+fc+'" style="width:'+l.taxa+'%"></div></div><span class="mpct">'+l.taxa+'%</span></div>';
    html+='</div></div>';

    /* nivel badge */
    html+='<div class="ht-td"><span class="npill '+nc(l.nivel)+'" style="padding:5px 14px;font-size:13px">'+l.nivel+'</span></div>';

    /* btn */
    html+='<div class="ht-td" onclick="event.stopPropagation()">';
    html+='<button class="btn-det" onclick="goDetail('+idx+')">Detalhe '+arrow()+'</button>';
    html+='</div>';

    html+='</div>';
  });

  document.getElementById('ht-body').innerHTML=html;
}

/* ────────────────── detail ────────────────── */
function renderDetail(l, idx){
  var pc=nc(l.nivel);
  var fc=fillCls(l.taxa);

  var html='<div class="d-card">';

  /* head row */
  html+='<div class="d-head">';

  /* rank */
  html+='<div class="d-rank">';
  html+='<span class="rank-n">'+(idx+1)+'</span>';
  html+='<span class="npill '+pc+'">'+l.nivel+'</span>';
  html+='</div>';

  /* identity */
  html+='<div class="d-id">';
  html+='<div class="d-nome">'+l.nome+'</div>';
  html+='<div style="font-size:12px;color:var(--ink-4);margin-top:3px">'+l.areas.length+' áreas HACCP</div>';
  html+='</div>';

  /* stats */
  html+='<div class="d-stats">';
  html+=dstat('Total',     fmt(l.totais.total),     '');
  html+=dstat('Fechadas',  fmt(l.totais.fechadas),  'hl');
  html+=dstat('Por fechar',fmt(l.totais.porFechar), '');
  html+='</div>';

  /* right: progress bar */
  html+='<div class="d-right">';
  html+='<div class="prog-row">';
  html+='<div class="pr-lbl"><span>Taxa de conclusão</span><span class="pr-pct">'+l.taxa+'%</span></div>';
  html+='<div class="pr-track"><div class="pr-fill '+fc+'" style="width:'+l.taxa+'%"></div></div>';
  html+='</div>';
  html+='</div>';

  html+='</div>'; /* d-head */

  /* areas grid */
  html+='<div class="area-grid">';
  l.areas.forEach(function(a){
    var afc=fillCls(a.taxa);
    html+='<div class="area-card">';
    html+='<div class="area-head">';
    html+='<span class="area-nome">'+a.area+'</span>';
    html+='<span class="npill '+nc(a.nivel)+'">'+a.taxa+'%</span>';
    html+='</div>';
    html+='<div class="area-body">';
    a.subareas.forEach(function(s){
      var stc=fillCls(s.total>0?Math.round(s.fechadas/s.total*100):0);
      var spct=s.total>0?Math.round(s.fechadas/s.total*100):0;
      html+='<div class="sub-row">';
      html+='<span class="sub-nome">'+s.subarea+'</span>';
      html+='<div class="sub-bar"><div class="sub-fill '+stc+'" style="width:'+spct+'%"></div></div>';
      html+='<div class="sub-meta"><span>'+fmt(s.fechadas)+' / '+fmt(s.total)+'</span><strong>'+spct+'%</strong></div>';
      html+='</div>';
    });
    html+='</div>';
    html+='</div>';
  });
  html+='</div>'; /* area-grid */

  html+='</div>'; /* d-card */

  document.getElementById('detail-screen').innerHTML=html;
}

function dstat(lbl,val,cls){
  return '<div class="dstat '+cls+'"><div class="dstat-lbl">'+lbl+'</div><div class="dstat-val">'+val+'</div></div>';
}
</script>
</body>
</html>
