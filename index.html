<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitorização HACCP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #111111;
  --ink-2:  #2a2a2a;
  --ink-3:  #333333;
  --ink-4:  #555555;
  --paper:  #ffffff;
  --paper-2: #f8f9fa;
  --line:   #e5e2d9;
  --line-2: #ccc9be;
  --n1:     #dc2626;
  --n2:     #ca8a04;
  --n3:     #eab308;
  --blue:   #2b2fd8;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 20px rgba(0,0,0,.04);
  --r: 12px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper-2);
  color: var(--ink);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* ── HEADER (ONLY FOR DETAIL) ── */
.hdr {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,.98); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  height: 62px; padding: 0 32px;
  display: none; align-items: center; gap: 20px;
}
.btn-back {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--line-2);
  background: #fff; font-size: 13px; font-weight: 700; color: var(--ink-2);
  cursor: pointer; transition: all .15s;
}
.btn-back:hover { background: #f1f3f5; border-color: var(--ink-2); }

/* ── KPI CARDS ── */
.kpi-section {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.kpi-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 24px;
  text-align: center;
  box-shadow: var(--shadow);
}

.kpi-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 12px;
}

.kpi-value {
  font-family: 'DM Serif Display', serif;
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
  margin-bottom: 8px;
}

.kpi-value.n1 { color: var(--n1); }
.kpi-value.n2 { color: var(--n2); }
.kpi-value.n3 { color: var(--n3); }
.kpi-value.blue { color: var(--blue); }

.kpi-subtitle {
  font-size: 13px;
  color: var(--ink-4);
  font-weight: 500;
}

/* ── FILTERS ── */
.filter-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}

.filter-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}

.filter-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 16px;
  border-radius: 99px;
  border: 1px solid var(--line-2);
  background: #fff;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-2);
  cursor: pointer;
  transition: all .15s;
}

.filter-btn.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

/* ── TABLE ── */
.table-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
}

th {
  background: #f1f3f5;
  padding: 16px 20px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--ink-2);
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
}

th:last-child { border-right: none; }

td {
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
  vertical-align: middle;
}

td:last-child { border-right: none; }

tr:hover td { background: #f8f9fa; }

/* ── TABLE CELLS ── */
.rank-num {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
  font-weight: 700;
}

.nivel-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  padding: 2px 8px;
  margin-top: 4px;
}

.nivel-badge.n1 { background: var(--n1); }
.nivel-badge.n2 { background: var(--n2); }
.nivel-badge.n3 { background: var(--n3); }

.loja-nome {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}

.tarefas-total {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}

.tarefas-detalhe {
  font-size: 12px;
  color: var(--ink-4);
}

.nova-badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--blue);
  color: var(--blue);
  font-size: 12px;
  font-weight: 700;
  background: transparent;
}

.btn-detalhe {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--line-2);
  background: #fff;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-2);
  cursor: pointer;
}

/* ── DETAIL VIEW STYLES ── */
.loja-header {
  background: #fff; border: 1px solid var(--line); border-radius: var(--r);
  padding: 24px 32px; margin-bottom: 24px; box-shadow: var(--shadow);
  display: flex; justify-content: space-between; align-items: center;
}
.lh-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); }
.lh-meta { font-size: 14px; color: var(--ink-4); margin-top: 4px; display: flex; align-items: center; gap: 12px; }

.area-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.area-tab {
  padding: 8px 18px; border-radius: 99px; border: 1px solid var(--line-2);
  background: #fff; font-size: 13px; font-weight: 700; color: var(--ink-3);
  cursor: pointer; transition: all .15s;
}
.area-tab.on { background: var(--ink); border-color: var(--ink); color: #fff; }

.subarea-section {
  background: #fff; border: 1px solid var(--line); border-radius: var(--r);
  padding: 24px; box-shadow: var(--shadow);
}
.subarea-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.sub-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); }
.sub-select {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line-2);
  background: #fff; font-size: 14px; font-weight: 600; color: var(--ink-2);
  cursor: pointer; min-width: 280px;
}

.vals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.val-card {
  background: #f8f9fa; border: 1px solid var(--line); border-radius: 10px;
  padding: 24px 16px; text-align: center;
}
.val-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); margin-bottom: 6px; }
.val-num { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--ink); line-height: 1; }

.loading { padding: 60px; text-align: center; color: var(--ink-4); font-size: 16px; font-weight: 600; }

@media (max-width: 1024px) {
  .kpi-section { grid-template-columns: repeat(3, 1fr); }
  .vals-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header class="hdr" id="main-header">
  <button class="btn-back" onclick="goHome()">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Voltar
  </button>
  <div style="font-family: 'DM Serif Display', serif; font-size: 19px;">Monitorização HACCP</div>
</header>

<div class="container" id="view-home">
  <div class="kpi-section">
    <div class="kpi-card"><div class="kpi-label">Total de Lojas</div><div class="kpi-value" id="kpi-total">—</div><div class="kpi-subtitle">Esta semana</div></div>
    <div class="kpi-card"><div class="kpi-label">Nível 1</div><div class="kpi-value n1" id="kpi-n1">—</div><div class="kpi-subtitle">0–20% prog. fechadas</div></div>
    <div class="kpi-card"><div class="kpi-label">Nível 2</div><div class="kpi-value n2" id="kpi-n2">—</div><div class="kpi-subtitle">21–40% prog. fechadas</div></div>
    <div class="kpi-card"><div class="kpi-label">Nível 3</div><div class="kpi-value n3" id="kpi-n3">—</div><div class="kpi-subtitle">41–50% prog. fechadas</div></div>
    <div class="kpi-card"><div class="kpi-label">Entradas Novas</div><div class="kpi-value blue" id="kpi-novas">—</div><div class="kpi-subtitle">Novas esta semana</div></div>
  </div>

  <div class="filter-section">
    <span class="filter-label">Mostrar:</span>
    <div class="filter-buttons">
      <button class="filter-btn active" onclick="filterByType('all')">Todas (<span id="count-all">0</span>)</button>
      <button class="filter-btn" onclick="filterByNivel('n1')">🔴 N1 (<span id="count-n1">0</span>)</button>
      <button class="filter-btn" onclick="filterByNivel('n2')">🟠 N2 (<span id="count-n2">0</span>)</button>
      <button class="filter-btn" onclick="filterByNivel('n3')">🟡 N3 (<span id="count-n3">0</span>)</button>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width: 60px; text-align: center;">#</th>
          <th>LOJA</th>
          <th>P TAREFAS</th>
          <th>NP TAREFAS</th>
          <th style="text-align: center;">ESTADO</th>
          <th style="width: 140px; text-align: center;">DETALHE</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="6" class="loading">A carregar dados...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="container" id="view-detail" style="display: none;">
  <div id="detail-content"></div>
</div>

<script>
var _lojas = [];
var _currentLojaIdx = null;
var _currentAreaIdx = 0;
var _currentSubareaIdx = 0;
var _nivelFiltro = null;

function fmt(n) { return Number(n).toLocaleString('pt-PT'); }

function loadData() {
  fetch('dados.json?t=' + Date.now())
    .then(r => r.json())
    .then(json => processData(json))
    .catch(err => {
      document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="loading" style="color:red">Erro: ${err.message}</td></tr>`;
    });
}

function processData(json) {
  _lojas = json.lojas || [];
  renderKPIs();
  renderTable();
}

function renderKPIs() {
  document.getElementById('kpi-total').textContent = _lojas.length;
  document.getElementById('kpi-n1').textContent = _lojas.filter(l => l.nivel === 'N1').length;
  document.getElementById('kpi-n2').textContent = _lojas.filter(l => l.nivel === 'N2').length;
  document.getElementById('kpi-n3').textContent = _lojas.filter(l => l.nivel === 'N3').length;
  document.getElementById('kpi-novas').textContent = 0; // Exemplo
  
  document.getElementById('count-all').textContent = _lojas.length;
  document.getElementById('count-n1').textContent = _lojas.filter(l => l.nivel === 'N1').length;
  document.getElementById('count-n2').textContent = _lojas.filter(l => l.nivel === 'N2').length;
  document.getElementById('count-n3').textContent = _lojas.filter(l => l.nivel === 'N3').length;
}

function filterByNivel(nivel) {
  _nivelFiltro = _nivelFiltro === nivel ? null : nivel;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (!_nivelFiltro) document.querySelector('[onclick="filterByType(\'all\')"]').classList.add('active');
  else document.querySelector(`[onclick="filterByNivel('${nivel}')"]`).classList.add('active');
  renderTable();
}

function filterByType(type) {
  _nivelFiltro = null;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[onclick="filterByType(\'all\')"]').classList.add('active');
  renderTable();
}

function renderTable() {
  var filtered = _nivelFiltro ? _lojas.filter(l => l.nivel === _nivelFiltro.toUpperCase()) : _lojas;
  var html = '';
  filtered.forEach((l, i) => {
    var p = l.totaisGlobais || {};
    html += `<tr>
      <td style="text-align: center;"><div class="rank-num">${i+1}</div><div class="nivel-badge ${l.nivel.toLowerCase()}">${l.nivel}</div></td>
      <td><div class="loja-nome">${l.nome}</div></td>
      <td><div class="tarefas-total">TOTAL ${fmt(p.pTotal||0)}</div><div class="tarefas-detalhe">${fmt(p.pAberto||0)} abertas · ${fmt(p.pFechado||0)} fechadas</div></td>
      <td><div class="tarefas-total">TOTAL ${fmt(p.npTotal||0)}</div><div class="tarefas-detalhe">${fmt(p.npAberto||0)} abertas · ${fmt(p.npFechado||0)} fechadas</div></td>
      <td style="text-align: center;">${l.isNova ? '<span class="nova-badge">+ Nova</span>' : ''}</td>
      <td style="text-align: center;"><button class="btn-detalhe" onclick="showDetail(${_lojas.indexOf(l)})">Detalhe →</button></td>
    </tr>`;
  });
  document.getElementById('table-body').innerHTML = html || '<tr><td colspan="6" class="loading">Sem dados.</td></tr>';
}

function showDetail(idx) {
  _currentLojaIdx = idx; _currentAreaIdx = 0; _currentSubareaIdx = 0;
  document.getElementById('view-home').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  document.getElementById('main-header').style.display = 'flex';
  renderDetail();
}

function goHome() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-home').style.display = 'block';
  document.getElementById('main-header').style.display = 'none';
}

function renderDetail() {
  var l = _lojas[_currentLojaIdx];
  if (!l) return;
  var h = `<div class="loja-header"><div><div class="lh-title">${l.nome}</div><div class="lh-meta"><span class="nivel-badge ${l.nivel.toLowerCase()}">${l.nivel}</span> Taxa: ${l.taxa}% | ${fmt(l.totaisGlobais.pTotal)} tarefas</div></div></div>`;
  if (l.areas && l.areas.length > 0) {
    h += `<div class="area-tabs">`;
    l.areas.forEach((a, i) => { h += `<button class="area-tab ${i===_currentAreaIdx?'on':''}" onclick="selectArea(${i})">${a.area}</button>`; });
    h += `</div><div class="subarea-section" id="subarea-content">${renderSubarea()}</div>`;
  }
  document.getElementById('detail-content').innerHTML = h;
}

function selectArea(idx) { _currentAreaIdx = idx; _currentSubareaIdx = 0; renderDetail(); }
function selectSubarea(idx) { _currentSubareaIdx = Number(idx); document.getElementById('subarea-content').innerHTML = renderSubarea(); }

function renderSubarea() {
  var area = _lojas[_currentLojaIdx].areas[_currentAreaIdx];
  var sub = area.subareas[_currentSubareaIdx] || area.subareas[0];
  var h = `<div class="subarea-row"><span class="sub-lbl">Subárea:</span><select class="sub-select" onchange="selectSubarea(this.value)">`;
  area.subareas.forEach((s, i) => { h += `<option value="${i}" ${i===_currentSubareaIdx?'selected':''}>${s.subarea}</option>`; });
  h += `</select><span class="nivel-badge ${sub.nivel.toLowerCase()}">${sub.nivel}</span></div>
  <div class="vals-grid">
    <div class="val-card"><div class="val-lbl">Total</div><div class="val-num">${fmt(sub.total)}</div></div>
    <div class="val-card"><div class="val-lbl">P. Abertas</div><div class="val-num" style="color:var(--n1)">${fmt(sub.pAberto)}</div></div>
    <div class="val-card"><div class="val-lbl">P. Fechadas</div><div class="val-num" style="color:var(--blue)">${fmt(sub.pFechado)}</div></div>
    <div class="val-card"><div class="val-lbl">NP. Abertas</div><div class="val-num" style="color:var(--n2)">${fmt(sub.npAberto)}</div></div>
  </div>`;
  return h;
}

window.addEventListener('load', loadData);
</script>
</body>
</html>
