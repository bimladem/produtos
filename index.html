<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Operacional IM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.1.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --ink: #1a1a1a; --ink-light: #666;
  --paper: #ffffff; --paper-alt: #f8f9fa;
  --accent: #2b2fd8; --accent-light: #eef0ff;
  --danger: #ff2222; --danger-light: #fff2f2;
  --warning: #ff7b00; --warning-light: #fff3e6;
  --success: #228b22; --success-light: #f0faf0;
  --line: #e0e0e0;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--paper-alt); color: var(--ink); line-height: 1.5; }

/* Header */
.header { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 1.5rem; }
.update-badge { font-size: 0.8rem; background: var(--accent-light); color: var(--accent); padding: 0.4rem 1rem; border-radius: 20px; font-weight: 700; }

.container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: white; padding: 1.5rem; border-radius: 16px; box-shadow: var(--shadow); text-align: center; }
.stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-light); margin-bottom: 0.5rem; font-weight: 700; }
.stat-value { font-family: 'DM Serif Display', serif; font-size: 2.5rem; line-height: 1; }

/* Table Style */
.table-container { background: white; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--paper-alt); padding: 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--ink-light); border-bottom: 1px solid var(--line); }
td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.2s; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--paper-alt); }

.rank { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--ink-light); width: 50px; }
.loja-name { font-weight: 700; font-size: 1.1rem; }
.progress-container { display: flex; align-items: center; gap: 1rem; min-width: 200px; }
.progress-bar { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.6s ease; }
.progress-text { font-weight: 700; font-size: 0.9rem; min-width: 40px; }

.badge { padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
.badge-n1 { background: var(--danger-light); color: var(--danger); }
.badge-n2 { background: var(--warning-light); color: var(--warning); }
.badge-n3 { background: var(--success-light); color: var(--success); }

/* Detail View */
.detail-view { display: none; }
.back-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; background: white; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; margin-bottom: 1.5rem; font-weight: 700; }
.loja-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; }
.loja-title { font-family: 'DM Serif Display', serif; font-size: 2.5rem; }

.areas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
.area-card { background: white; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
.area-header { padding: 1.25rem; background: var(--paper-alt); border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.area-name { font-weight: 700; font-size: 1rem; }
.area-taxa { font-weight: 700; color: var(--accent); }
.area-body { padding: 1.25rem; }

.subarea-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
.subarea-item:last-child { border-bottom: none; }
.subarea-val { font-weight: 700; color: var(--ink-light); }

.loading { text-align: center; padding: 4rem; font-size: 1.2rem; color: var(--ink-light); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Análise Operacional IM</div>
  <div id="periodo" class="update-badge">A carregar...</div>
</div>

<div class="container">
  <!-- Home Screen -->
  <div id="home-screen">
    <div id="stats" class="stats-grid"></div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Loja</th>
            <th>Conformidade</th>
            <th>Tarefas</th>
            <th>Nível</th>
          </tr>
        </thead>
        <tbody id="lojas-list"></tbody>
      </table>
    </div>
  </div>

  <!-- Detail Screen -->
  <div id="detail-screen" class="detail-view">
    <button class="back-btn" onclick="showHome()">← Voltar</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
let _lojas = [];

async function loadData() {
  try {
    const r = await fetch('dados.json?t=' + Date.now());
    if (!r.ok) throw new Error();
    const data = await r.json();
    _lojas = data.lojas || [];
    document.getElementById('periodo').textContent = '📅 Atualizado em: ' + new Date(data.atualizadoEm).toLocaleDateString();
    renderHome();
  } catch (e) {
    document.getElementById('home-screen').innerHTML = '<div class="loading">Erro: Ficheiro <b>dados.json</b> não encontrado no repositório.</div>';
  }
}

function fmt(n) { return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

function renderHome() {
  const n1 = _lojas.filter(l => l.nivel === 'N1').length;
  const n2 = _lojas.filter(l => l.nivel === 'N2').length;
  const n3 = _lojas.filter(l => l.nivel === 'N3').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Lojas</div><div class="stat-value">${_lojas.length}</div></div>
    <div class="stat-card" style="border-bottom: 4px solid var(--danger)"><div class="stat-label">Nível 1</div><div class="stat-value" style="color:var(--danger)">${n1}</div></div>
    <div class="stat-card" style="border-bottom: 4px solid var(--warning)"><div class="stat-label">Nível 2</div><div class="stat-value" style="color:var(--warning)">${n2}</div></div>
    <div class="stat-card" style="border-bottom: 4px solid var(--success)"><div class="stat-label">Nível 3</div><div class="stat-value" style="color:var(--success)">${n3}</div></div>
  `;

  document.getElementById('lojas-list').innerHTML = _lojas.map((l, i) => `
    <tr onclick="showDetail(${i})">
      <td class="rank">${i + 1}</td>
      <td><div class="loja-name">${l.nome}</div></td>
      <td>
        <div class="progress-container">
          <div class="progress-bar"><div class="progress-fill" style="width: ${l.taxa}%"></div></div>
          <span class="progress-text">${l.taxa}%</span>
        </div>
      </td>
      <td style="font-size: 0.9rem; color: var(--ink-light)"><b>${fmt(l.totais.fechadas)}</b> / ${fmt(l.totais.total)}</td>
      <td><span class="badge badge-${l.nivel.toLowerCase()}">${l.nivel}</span></td>
    </tr>
  `).join('');
}

function showDetail(idx) {
  const l = _lojas[idx];
  document.getElementById('detail-content').innerHTML = `
    <div class="loja-header">
      <div>
        <div class="loja-title">${l.nome}</div>
        <div style="margin-top:0.5rem"><span class="badge badge-${l.nivel.toLowerCase()}">Nível ${l.nivel}</span></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:3rem; font-weight:700; color:var(--accent); line-height:1">${l.taxa}%</div>
        <div class="stat-label">Taxa Global</div>
      </div>
    </div>

    <div class="stats-grid" style="margin-bottom:3rem">
      <div class="stat-card"><div class="stat-label">Total Tarefas</div><div class="stat-value">${fmt(l.totais.total)}</div></div>
      <div class="stat-card"><div class="stat-label">Fechadas</div><div class="stat-value" style="color:var(--accent)">${fmt(l.totais.fechadas)}</div></div>
      <div class="stat-card"><div class="stat-label">Por Fechar</div><div class="stat-value" style="color:var(--danger)">${fmt(l.totais.porFechar)}</div></div>
    </div>

    <h2 style="font-family:'DM Serif Display'; margin-bottom:1.5rem; font-size:1.8rem">Análise por Área</h2>
    <div class="areas-grid">
      ${l.areas.map(a => `
        <div class="area-card">
          <div class="area-header">
            <span class="area-name">${a.area}</span>
            <span class="area-taxa">${a.taxa}%</span>
          </div>
          <div class="area-body">
            ${a.subareas.map(s => `
              <div class="subarea-item">
                <span>${s.subarea}</span>
                <span class="subarea-val">${s.fechadas} / ${s.total}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('detail-screen').style.display = 'block';
  window.scrollTo(0,0);
}

function showHome() {
  document.getElementById('detail-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'block';
}

window.onload = loadData;
</script>
</body>
</html>
