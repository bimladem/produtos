<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitorização HACCP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #111111;
  --ink-2:  #2a2a2a;
  --ink-3:  #333333;
  --ink-4:  #555555;
  --paper:  #ffffff;
  --paper-2: #f8f9fa;
  --line:   #e5e2d9;
  --line-2: #ccc9be;
  --n1:     #dc2626;  --n1-bg:   #fef2f2;
  --n2:     #ca8a04;  --n2-bg:   #fefce8;
  --n3:     #eab308;  --n3-bg:   #fffbeb;
  --blue:   #2b2fd8;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 20px rgba(0,0,0,.04);
  --r: 12px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper-2); color: var(--ink);
  font-size: 15px; -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,.98); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  height: 62px; padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.hdr-left { display: flex; align-items: center; gap: 12px; }
.hdr-icon {
  width: 36px; height: 36px; border-radius: 9px; background: #1c1c2e;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.hdr-icon svg { width: 18px; height: 18px; fill: #fff; }
.hdr-title { font-family: 'DM Serif Display', serif; font-size: 19px; letter-spacing: -.2px; }
.hdr-sub   { font-size: 11.5px; color: var(--ink-4); margin-top: 1px; }

.btn-back {
  display: none; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--line-2);
  background: #fff; font-size: 13px; font-weight: 700; color: var(--ink-2);
  cursor: pointer; transition: all .15s;
}
.btn-back:hover { background: #f1f3f5; border-color: var(--ink-2); }
.btn-back.visible { display: flex; }

/* ── MAIN ── */
.main { max-width: 1300px; margin: 0 auto; padding: 28px 24px 80px; }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── HOME VIEW ── */
.kpi-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.kpi-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r); padding: 20px;
  box-shadow: var(--shadow); text-align: center;
}
.kpi-lbl { font-size: 11px; font-weight: 800; letter-spacing: .7px; text-transform: uppercase; color: var(--ink-4); margin-bottom: 8px; }
.kpi-val { font-family: 'DM Serif Display', serif; font-size: 40px; line-height: 1; color: var(--ink); }
.kpi-val.red { color: var(--n1); }
.kpi-val.blue { color: var(--blue); }

.tbl-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow);
}
table { width: 100%; border-collapse: collapse; text-align: left; }
th {
  background: #f1f3f5; padding: 14px 20px; font-size: 12px; font-weight: 800;
  letter-spacing: .5px; text-transform: uppercase; color: var(--ink-2);
  border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
}
th:last-child { border-right: none; }
td {
  padding: 16px 20px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
  vertical-align: middle; font-weight: 600;
}
td:last-child { border-right: none; }
tr:hover td { background: #f8f9fa; }

.col-center { text-align: center; }
.rank-num { font-family: 'DM Serif Display', serif; font-size: 24px; }
.loja-nome { font-size: 16px; font-weight: 700; color: var(--ink); }

.btn-detalhe {
  padding: 8px 16px; border-radius: 8px; border: 1px solid var(--line-2);
  background: #fff; font-size: 13px; font-weight: 700; color: var(--ink-2);
  cursor: pointer; transition: all .15s;
}
.btn-detalhe:hover { background: #f1f3f5; border-color: var(--ink-2); }

/* ── DETAIL VIEW ── */
.loja-header {
  background: #fff; border: 1px solid var(--line); border-radius: var(--r);
  padding: 24px 32px; margin-bottom: 24px; box-shadow: var(--shadow);
  display: flex; justify-content: space-between; align-items: center;
}
.lh-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); }
.lh-meta { font-size: 14px; color: var(--ink-4); margin-top: 4px; }

.area-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.area-tab {
  padding: 8px 18px; border-radius: 99px; border: 1px solid var(--line-2);
  background: #fff; font-size: 13px; font-weight: 700; color: var(--ink-3);
  cursor: pointer; transition: all .15s;
}
.area-tab.on { background: #1c1c2e; border-color: #1c1c2e; color: #fff; }

.subarea-section {
  background: #fff; border: 1px solid var(--line); border-radius: var(--r);
  padding: 24px; box-shadow: var(--shadow);
}
.subarea-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.sub-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); }
.sub-select {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line-2);
  background: #fff; font-size: 14px; font-weight: 600; color: var(--ink-2);
  cursor: pointer; min-width: 280px;
}

.vals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.val-card {
  background: #f8f9fa; border: 1px solid var(--line); border-radius: 10px;
  padding: 24px 16px; text-align: center;
}
.val-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); margin-bottom: 6px; }
.val-num { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--ink); line-height: 1; }
.val-sub { font-size: 12px; color: var(--ink-4); margin-top: 6px; font-weight: 500; }

.loading { padding: 80px; text-align: center; color: var(--ink-4); font-size: 16px; font-weight: 600; }

/* Status indicators */
.status-badge {
  display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.status-n1 { background: var(--n1-bg); color: var(--n1); }
.status-n2 { background: var(--n2-bg); color: var(--n2); }
.status-n3 { background: var(--n3-bg); color: var(--n3); }

@media (max-width: 768px) {
  .vals-grid { grid-template-columns: repeat(2, 1fr); }
  .hdr { padding: 0 16px; }
  .main { padding: 16px 12px 60px; }
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <button class="btn-back" id="btn-back" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Voltar
    </button>
    <div class="hdr-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="17" y="5" width="4" height="16" rx="1"/></svg>
    </div>
    <div>
      <div class="hdr-title">Monitorização HACCP</div>
      <div class="hdr-sub" id="hsub">A carregar...</div>
    </div>
  </div>
  <div class="hdr-badge" id="hdate">—</div>
</header>

<main class="main">
  <!-- HOME VIEW -->
  <div id="view-home" class="view active">
    <div class="kpi-row" id="kpi-container">
      <div class="kpi-card"><div class="kpi-lbl">TOTAL DE LOJAS</div><div class="kpi-val" id="kpi-total">—</div></div>
      <div class="kpi-card"><div class="kpi-lbl">TAXA MÉDIA</div><div class="kpi-val blue" id="kpi-taxa">—</div></div>
      <div class="kpi-card"><div class="kpi-lbl">TAREFAS ABERTAS</div><div class="kpi-val red" id="kpi-abertas">—</div></div>
    </div>

    <div class="tbl-card">
      <table>
        <thead>
          <tr>
            <th style="width: 70px;">#</th>
            <th>LOJA</th>
            <th class="col-center" style="width: 120px;">TAXA</th>
            <th class="col-center" style="width: 120px;">NÍVEL</th>
            <th class="col-center" style="width: 140px;">TOTAL</th>
            <th class="col-center" style="width: 140px;">ABERTAS</th>
            <th class="col-center" style="width: 140px;">DETALHES</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr><td colspan="7" class="loading">A carregar dados...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" class="view">
    <div id="detail-content"></div>
  </div>
</main>

<script>
var _lojas = [];
var _currentLojaIdx = null;
var _currentAreaIdx = 0;
var _currentSubareaIdx = 0;

function fmt(n) { return Number(n).toLocaleString('pt-PT'); }

function getNivelClass(nivel) {
  if (nivel === 'N1') return 'status-n1';
  if (nivel === 'N2') return 'status-n2';
  if (nivel === 'N3') return 'status-n3';
  return '';
}

function loadData() {
  fetch('dados.json?t=' + Date.now())
    .then(r => r.json())
    .then(json => processData(json))
    .catch(e => {
      fetch('Dados.json?t=' + Date.now())
        .then(r => r.json())
        .then(json => processData(json))
        .catch(err => {
          document.getElementById('tbl-body').innerHTML = `<tr><td colspan="7" class="loading" style="color:red">Erro ao carregar dados: ${err.message}</td></tr>`;
        });
    });
}

function processData(json) {
  // Nova estrutura de dados com lojas diretamente no array
  if (json.lojas && Array.isArray(json.lojas)) {
    _lojas = json.lojas;
    
    // Atualizar data de atualização
    if (json.atualizadoEm) {
      var dt = new Date(json.atualizadoEm);
      document.getElementById('hdate').textContent = dt.toLocaleDateString('pt-PT', {day:'2-digit', month:'short', year:'numeric'});
    }
  } else {
    // Fallback para estrutura antiga
    _lojas = json.lojas || [];
  }
  
  document.getElementById('hsub').textContent = _lojas.length + ' lojas monitorizadas';
  renderHome();
}

function renderHome() {
  var totalTaxa = 0;
  var totalAbertas = 0;
  
  _lojas.forEach(l => {
    totalTaxa += (l.taxa || 0);
    totalAbertas += (l.totaisGlobais?.pAberto || 0);
  });
  
  var mediaTaxa = _lojas.length > 0 ? Math.round(totalTaxa / _lojas.length) : 0;
  
  document.getElementById('kpi-total').textContent = _lojas.length;
  document.getElementById('kpi-taxa').textContent = mediaTaxa + '%';
  document.getElementById('kpi-abertas').textContent = fmt(totalAbertas);
  
  var html = '';
  _lojas.forEach((l, i) => {
    var totalTarefas = l.totaisGlobais?.pTotal || 0;
    var tarefasAbertas = l.totaisGlobais?.pAberto || 0;
    var nivelClass = getNivelClass(l.nivel);
    
    html += `<tr>
      <td class="col-center"><span class="rank-num">${i + 1}</span></td>
      <td><span class="loja-nome">${l.nome}</span></td>
      <td class="col-center">${l.taxa || 0}%</td>
      <td class="col-center"><span class="status-badge ${nivelClass}">${l.nivel || '—'}</span></td>
      <td class="col-center">${fmt(totalTarefas)}</td>
      <td class="col-center" style="color:var(--n1)">${fmt(tarefasAbertas)}</td>
      <td class="col-center"><button class="btn-detalhe" onclick="showDetail(${i})">Detalhe &rarr;</button></td>
    </tr>`;
  });
  
  document.getElementById('tbl-body').innerHTML = html || '<tr><td colspan="7" class="loading">Sem dados disponíveis.</td></tr>';
}

function showDetail(idx) {
  _currentLojaIdx = idx;
  _currentAreaIdx = 0;
  _currentSubareaIdx = 0;
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('btn-back').classList.add('visible');
  renderDetail();
}

function goHome() {
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
  document.getElementById('btn-back').classList.remove('visible');
}

function renderDetail() {
  var l = _lojas[_currentLojaIdx];
  if (!l) return;
  
  var totalTarefas = l.totaisGlobais?.pTotal || 0;
  var nivelClass = getNivelClass(l.nivel);
  
  var h = `<div class="loja-header">
    <div>
      <div class="lh-title">${l.nome}</div>
      <div class="lh-meta">
        <span class="status-badge ${nivelClass}" style="margin-right: 12px;">${l.nivel || '—'}</span>
        Taxa: ${l.taxa || 0}% | ${fmt(totalTarefas)} tarefas totais
      </div>
    </div>
  </div>`;
  
  if (l.areas && l.areas.length > 0) {
    h += `<div class="area-tabs">`;
    l.areas.forEach((a, i) => {
      h += `<button class="area-tab ${i === _currentAreaIdx ? 'on' : ''}" onclick="selectArea(${i})">${a.area}</button>`;
    });
    h += `</div><div class="subarea-section" id="subarea-content">${renderSubarea()}</div>`;
  } else {
    h += `<div class="loading">Sem detalhes de áreas disponíveis para esta loja.</div>`;
  }
  
  document.getElementById('detail-content').innerHTML = h;
}

function selectArea(idx) {
  _currentAreaIdx = idx;
  _currentSubareaIdx = 0;
  renderDetail();
}

function selectSubarea(idx) {
  _currentSubareaIdx = Number(idx);
  document.getElementById('subarea-content').innerHTML = renderSubarea();
}

function renderSubarea() {
  var area = _lojas[_currentLojaIdx].areas[_currentAreaIdx];
  if (!area || !area.subareas || area.subareas.length === 0) {
    return '<div class="loading">Sem dados nesta área.</div>';
  }
  
  var sub = area.subareas[_currentSubareaIdx] || area.subareas[0];
  var nivelClass = getNivelClass(sub.nivel);
  
  var h = `<div class="subarea-row">
    <span class="sub-lbl">Subárea:</span>
    <select class="sub-select" onchange="selectSubarea(this.value)">`;
  
  area.subareas.forEach((s, i) => {
    h += `<option value="${i}" ${i === _currentSubareaIdx ? 'selected' : ''}>${s.subarea}</option>`;
  });
  
  h += `</select>
    <span class="status-badge ${nivelClass}" style="margin-left: 12px;">${sub.nivel || '—'}</span>
  </div>
  
  <div class="vals-grid">
    <div class="val-card">
      <div class="val-lbl">Total</div>
      <div class="val-num">${fmt(sub.total || 0)}</div>
    </div>
    <div class="val-card">
      <div class="val-lbl">Programadas Abertas</div>
      <div class="val-num" style="color: var(--n1);">${fmt(sub.pAberto || 0)}</div>
    </div>
    <div class="val-card">
      <div class="val-lbl">Programadas Fechadas</div>
      <div class="val-num" style="color: var(--blue);">${fmt(sub.pFechado || 0)}</div>
    </div>
    <div class="val-card">
      <div class="val-lbl">Não Programadas Abertas</div>
      <div class="val-num" style="color: var(--n2);">${fmt(sub.npAberto || 0)}</div>
    </div>
  </div>`;
  
  return h;
}

// Carregar dados ao abrir a página
window.addEventListener('load', loadData);
</script>
</body>
</html>
