<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitorização HACCP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #111111;
  --ink-2:  #2a2a2a;
  --ink-3:  #333333;
  --ink-4:  #555555;
  --paper:  #ffffff;
  --paper-2: #f8f9fa;
  --line:   #e5e2d9;
  --line-2: #ccc9be;
  --n1:     #dc2626;
  --n2:     #ca8a04;
  --n3:     #eab308;
  --blue:   #2b2fd8;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 20px rgba(0,0,0,.04);
  --r: 12px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper-2);
  color: var(--ink);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* ── KPI CARDS ── */
.kpi-section {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.kpi-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 24px;
  text-align: center;
  box-shadow: var(--shadow);
  transition: all .2s;
}

.kpi-card:hover {
  border-color: var(--ink-3);
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

.kpi-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-bottom: 12px;
}

.kpi-value {
  font-family: 'DM Serif Display', serif;
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
  margin-bottom: 8px;
}

.kpi-value.n1 { color: var(--n1); }
.kpi-value.n2 { color: var(--n2); }
.kpi-value.n3 { color: var(--n3); }
.kpi-value.blue { color: var(--blue); }

.kpi-subtitle {
  font-size: 13px;
  color: var(--ink-4);
  font-weight: 500;
}

/* ── FILTERS ── */
.filter-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}

.filter-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}

.filter-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 16px;
  border-radius: 99px;
  border: 1px solid var(--line-2);
  background: #fff;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-2);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.filter-btn:hover {
  border-color: var(--ink-2);
  background: #f1f3f5;
}

.filter-btn.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

.filter-btn.nivel-n1 { color: var(--n1); }
.filter-btn.nivel-n1.active { background: var(--n1); color: #fff; border-color: var(--n1); }

.filter-btn.nivel-n2 { color: var(--n2); }
.filter-btn.nivel-n2.active { background: var(--n2); color: #fff; border-color: var(--n2); }

.filter-btn.nivel-n3 { color: var(--n3); }
.filter-btn.nivel-n3.active { background: var(--n3); color: #fff; border-color: var(--n3); }

/* ── TABLE ── */
.table-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
}

th {
  background: #f1f3f5;
  padding: 16px 20px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--ink-2);
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
}

th:last-child { border-right: none; }

td {
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
  vertical-align: middle;
  font-weight: 500;
}

td:last-child { border-right: none; }

tr:hover td {
  background: #f8f9fa;
}

/* ── TABLE CELLS ── */
.rank-col {
  text-align: center;
  width: 50px;
}

.rank-num {
  font-family: 'DM Serif Display', serif;
  font-size: 24px;
  font-weight: 700;
}

.nivel-badge {
  display: inline-block;
  width: 24px;
  height: 24px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  margin-top: 4px;
}

.nivel-badge.n1 { background: var(--n1); }
.nivel-badge.n2 { background: var(--n2); }
.nivel-badge.n3 { background: var(--n3); }

.loja-info {
  min-width: 200px;
}

.loja-nome {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}

.loja-id {
  font-size: 12px;
  color: var(--ink-4);
}

.tarefas-col {
  min-width: 180px;
}

.tarefas-total {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}

.tarefas-detalhe {
  font-size: 12px;
  color: var(--ink-4);
}

.comparacao-col {
  min-width: 200px;
}

.progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.progress-label {
  font-size: 11px;
  font-weight: 700;
  width: 20px;
  color: var(--ink-4);
}

.progress-bar {
  flex: 1;
  height: 6px;
  background: #e5e2d9;
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .3s;
}

.progress-fill.p { background: var(--blue); }
.progress-fill.np { background: var(--n2); }

.progress-percent {
  font-size: 12px;
  font-weight: 700;
  color: var(--blue);
  min-width: 35px;
  text-align: right;
}

.progress-percent.np { color: var(--n2); }

.estado-col {
  text-align: center;
  min-width: 100px;
}

.nova-badge {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--blue);
  background: transparent;
  color: var(--blue);
  font-size: 12px;
  font-weight: 700;
}

.detalhe-col {
  text-align: center;
  min-width: 100px;
}

.btn-detalhe {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--line-2);
  background: #fff;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-2);
  cursor: pointer;
  transition: all .15s;
}

.btn-detalhe:hover {
  background: #f1f3f5;
  border-color: var(--ink-2);
}

.loading {
  padding: 60px 20px;
  text-align: center;
  color: var(--ink-4);
  font-size: 16px;
  font-weight: 600;
}

@media (max-width: 1200px) {
  .kpi-section {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 768px) {
  .kpi-section {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .filter-section {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>
<body>

<div class="container">
  <!-- KPI CARDS -->
  <div class="kpi-section" id="kpi-section">
    <div class="kpi-card">
      <div class="kpi-label">Total de Lojas</div>
      <div class="kpi-value" id="kpi-total">—</div>
      <div class="kpi-subtitle">Esta semana</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Nível 1</div>
      <div class="kpi-value n1" id="kpi-n1">—</div>
      <div class="kpi-subtitle">0–20% prog. fechadas</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Nível 2</div>
      <div class="kpi-value n2" id="kpi-n2">—</div>
      <div class="kpi-subtitle">21–40% prog. fechadas</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Nível 3</div>
      <div class="kpi-value n3" id="kpi-n3">—</div>
      <div class="kpi-subtitle">41–50% prog. fechadas</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Entradas Novas</div>
      <div class="kpi-value blue" id="kpi-novas">—</div>
      <div class="kpi-subtitle" id="kpi-novas-sub">Não presentes em 09 mai a 16 mai</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-section">
    <span class="filter-label">Mostrar:</span>
    <div class="filter-buttons">
      <button class="filter-btn active" onclick="filterByType('all')">Todas (<span id="count-all">0</span>)</button>
      <button class="filter-btn" onclick="filterByType('anteriores')">Lojas Anteriores (<span id="count-anteriores">0</span>)</button>
      <button class="filter-btn" onclick="filterByType('novas')">Entradas Novas (<span id="count-novas">0</span>)</button>
      <button class="filter-btn nivel-n1" onclick="filterByNivel('n1')">🔴 N1 (<span id="count-n1">0</span>)</button>
      <button class="filter-btn nivel-n2" onclick="filterByNivel('n2')">🟠 N2 (<span id="count-n2">0</span>)</button>
      <button class="filter-btn nivel-n3" onclick="filterByNivel('n3')">🟡 N3 (<span id="count-n3">0</span>)</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width: 60px;">#</th>
          <th>LOJA</th>
          <th>P TAREFAS</th>
          <th>NP TAREFAS</th>
          <th>COMPARAÇÃO P VS NP</th>
          <th>ESTADO</th>
          <th style="width: 120px;">DETALHE</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7" class="loading">A carregar dados...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
var _lojas = [];
var _filtroAtual = 'all';
var _nivelAtual = null;

function fmt(n) {
  return Number(n).toLocaleString('pt-PT');
}

function calcularNivel(taxa) {
  if (taxa === 0) return 'N3';
  if (taxa <= 20) return 'N1';
  if (taxa <= 40) return 'N2';
  return 'N3';
}

function loadData() {
  fetch('dados.json?t=' + Date.now())
    .then(r => r.json())
    .then(json => processData(json))
    .catch(e => {
      fetch('Dados.json?t=' + Date.now())
        .then(r => r.json())
        .then(json => processData(json))
        .catch(err => {
          document.getElementById('table-body').innerHTML = `<tr><td colspan="7" class="loading" style="color:red">Erro ao carregar dados: ${err.message}</td></tr>`;
        });
    });
}

function processData(json) {
  if (json.lojas && Array.isArray(json.lojas)) {
    _lojas = json.lojas.map((loja, idx) => ({
      ...loja,
      index: idx,
      isNova: false
    }));
  }
  
  renderKPIs();
  renderFilters();
  renderTable();
}

function renderKPIs() {
  var totalLojas = _lojas.length;
  var n1Count = _lojas.filter(l => l.nivel === 'N1').length;
  var n2Count = _lojas.filter(l => l.nivel === 'N2').length;
  var n3Count = _lojas.filter(l => l.nivel === 'N3').length;
  var novasCount = _lojas.filter(l => l.isNova).length;
  
  document.getElementById('kpi-total').textContent = totalLojas;
  document.getElementById('kpi-n1').textContent = n1Count;
  document.getElementById('kpi-n2').textContent = n2Count;
  document.getElementById('kpi-n3').textContent = n3Count;
  document.getElementById('kpi-novas').textContent = novasCount;
}

function renderFilters() {
  var totalLojas = _lojas.length;
  var anterioresCount = _lojas.filter(l => !l.isNova).length;
  var novasCount = _lojas.filter(l => l.isNova).length;
  var n1Count = _lojas.filter(l => l.nivel === 'N1').length;
  var n2Count = _lojas.filter(l => l.nivel === 'N2').length;
  var n3Count = _lojas.filter(l => l.nivel === 'N3').length;
  
  document.getElementById('count-all').textContent = totalLojas;
  document.getElementById('count-anteriores').textContent = anterioresCount;
  document.getElementById('count-novas').textContent = novasCount;
  document.getElementById('count-n1').textContent = n1Count;
  document.getElementById('count-n2').textContent = n2Count;
  document.getElementById('count-n3').textContent = n3Count;
}

function filterByType(tipo) {
  _filtroAtual = tipo;
  _nivelAtual = null;
  updateFilterButtons();
  renderTable();
}

function filterByNivel(nivel) {
  _nivelAtual = _nivelAtual === nivel ? null : nivel;
  _filtroAtual = 'all';
  updateFilterButtons();
  renderTable();
}

function updateFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  
  if (_nivelAtual) {
    document.querySelector(`.filter-btn.nivel-${_nivelAtual}`).classList.add('active');
  } else {
    document.querySelector(`.filter-btn[onclick="filterByType('${_filtroAtual}')"]`).classList.add('active');
  }
}

function getFilteredLojas() {
  var filtered = _lojas;
  
  if (_nivelAtual) {
    filtered = filtered.filter(l => l.nivel === _nivelAtual.toUpperCase());
  } else if (_filtroAtual === 'novas') {
    filtered = filtered.filter(l => l.isNova);
  } else if (_filtroAtual === 'anteriores') {
    filtered = filtered.filter(l => !l.isNova);
  }
  
  return filtered;
}

function renderTable() {
  var filtered = getFilteredLojas();
  
  if (filtered.length === 0) {
    document.getElementById('table-body').innerHTML = '<tr><td colspan="7" class="loading">Sem dados para exibir.</td></tr>';
    return;
  }
  
  var html = '';
  filtered.forEach((loja, idx) => {
    var pTotal = loja.totaisGlobais?.pTotal || 0;
    var pAberto = loja.totaisGlobais?.pAberto || 0;
    var pFechado = loja.totaisGlobais?.pFechado || 0;
    var npTotal = loja.totaisGlobais?.npTotal || 0;
    var npAberto = loja.totaisGlobais?.npAberto || 0;
    var npFechado = loja.totaisGlobais?.npFechado || 0;
    
    var pPercent = pTotal > 0 ? Math.round((pAberto / pTotal) * 100) : 0;
    var npPercent = npTotal > 0 ? Math.round((npAberto / npTotal) * 100) : 0;
    
    var nivelClass = `nivel-badge ${loja.nivel.toLowerCase()}`;
    var novaHtml = loja.isNova ? '<button class="nova-badge">+ Nova</button>' : '';
    
    html += `<tr>
      <td class="rank-col">
        <div class="rank-num">${idx + 1}</div>
        <div class="${nivelClass}">${loja.nivel}</div>
      </td>
      <td>
        <div class="loja-info">
          <div class="loja-nome">${loja.nome}</div>
          <div class="loja-id">IM ${String(loja.nome).substring(0, 5).toUpperCase()}</div>
        </div>
      </td>
      <td>
        <div class="tarefas-col">
          <div class="tarefas-total">TOTAL ${fmt(pTotal)}</div>
          <div class="tarefas-detalhe">${fmt(pAberto)} abertas · ${fmt(pFechado)} fechadas</div>
        </div>
      </td>
      <td>
        <div class="tarefas-col">
          <div class="tarefas-total">TOTAL ${fmt(npTotal)}</div>
          <div class="tarefas-detalhe">${fmt(npAberto)} abertas · ${fmt(npFechado)} fechadas</div>
        </div>
      </td>
      <td>
        <div class="comparacao-col">
          <div class="progress-row">
            <span class="progress-label">P</span>
            <div class="progress-bar"><div class="progress-fill p" style="width: ${pPercent}%"></div></div>
            <span class="progress-percent">${pPercent}%</span>
          </div>
          <div class="progress-row">
            <span class="progress-label">NP</span>
            <div class="progress-bar"><div class="progress-fill np" style="width: ${npPercent}%"></div></div>
            <span class="progress-percent np">${npPercent}%</span>
          </div>
        </div>
      </td>
      <td class="estado-col">
        ${novaHtml}
      </td>
      <td class="detalhe-col">
        <button class="btn-detalhe" onclick="showDetail(${loja.index})">Detalhe →</button>
      </td>
    </tr>`;
  });
  
  document.getElementById('table-body').innerHTML = html;
}

function showDetail(idx) {
  alert('Detalhe da loja: ' + _lojas[idx].nome);
}

// Carregar dados ao abrir a página
window.addEventListener('load', loadData);
</script>
</body>
</html>
