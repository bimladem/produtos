<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitorização HACCP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.1.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --ink: #000000;
  --ink-2: #1a1a1a;
  --ink-3: #333333;
  --ink-4: #555555;
  --paper: #ffffff;
  --paper-2: #f8f9fa;
  --paper-3: #f1f3f5;
  --line: #d1d1d1;
  --line-2: #b1b1b1;
  --n1: #ff2222; --n1-bg: #fff2f2;
  --n2: #ff7b00; --n2-bg: #fff3e6;
  --n3: #ffcc00; --n3-bg: #fffbe6;
  --bar-blue: #2b2fd8;
  --bar-orange: #d8722a;
  --bar-track: #e4e4e8;
  --btn-border: #b1b1b1;
  --btn-text: #222;
  --shadow: 0 1px 4px rgba(0,0,0,.06), 0 2px 12px rgba(0,0,0,.04);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,.98);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line);
  padding: 0 32px;
  height: 62px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: #1c1c2e;
  display: flex; align-items: center; justify-content: center;
}
.header-icon svg { width: 18px; height: 18px; fill: #fff; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--ink); letter-spacing: -0.2px; white-space: nowrap; }
.header-subtitle { font-size: 11.5px; color: var(--ink-4); margin-top: 1px; }
.btn-back {
  display: none; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 7px;
  border: 1px solid var(--line-2); background: var(--paper-3);
  font-size: 13px; font-weight: 600; color: var(--ink-2);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--ink-2); background: var(--paper); }
.btn-back.visible { display: flex; }
.btn-back svg { width: 14px; height: 14px; }

/* ── MAIN ── */
.main { max-width: 1320px; margin: 0 auto; padding: 28px 24px 64px; }

/* ── STAT CARDS ── */
.home-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: 14px; padding: 20px 20px 16px;
  box-shadow: var(--shadow);
  display: flex; flex-direction: column; gap: 6px;
  align-items: center; text-align: center;
}
.stat-card-label { font-size: 12px; font-weight: 800; letter-spacing: 0.7px; text-transform: uppercase; color: var(--ink-4); }
.stat-card-val { font-family: 'DM Serif Display', serif; font-size: 42px; line-height: 1; color: var(--ink); }
.stat-card-sub { font-size: 13px; color: var(--ink-4); margin-top: 2px; font-weight: 600; }
.stat-card.accent-red    .stat-card-val { color: var(--n1); }
.stat-card.accent-amber  .stat-card-val { color: var(--n2); }
.stat-card.accent-yellow .stat-card-val { color: var(--n3); }
.stat-card.accent-blue   .stat-card-val { color: var(--bar-blue); }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.filter-label { font-size: 14px; color: var(--ink); font-weight: 700; margin-right: 4px; }
.filter-btn {
  padding: 6px 16px; border-radius: 99px;
  border: 1px solid var(--line-2); background: #fff;
  font-size: 13px; font-weight: 600; color: var(--ink-3);
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--ink); color: var(--ink); }
.filter-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; }
.filter-divider { width: 1px; height: 20px; background: var(--line-2); }

/* ── HOME TABLE ── */
.home-table {
  background: #fff; border: 1px solid var(--line);
  border-radius: 14px; overflow: hidden; box-shadow: var(--shadow);
}
.ht-head {
  display: grid;
  grid-template-columns: 76px 220px 1fr 1fr 180px 110px 136px;
  background: #f1f3f5; border-bottom: 1px solid var(--line);
}
.ht-th {
  padding: 14px 12px; font-size: 13px; font-weight: 800;
  letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink);
  text-align: center; border-right: 1px solid var(--line);
  white-space: nowrap;
}
.ht-th:last-child { border-right: none; }
.ht-th.left { text-align: left; padding-left: 16px; }

.ht-row {
  display: grid;
  grid-template-columns: 76px 220px 1fr 1fr 180px 110px 136px;
  border-bottom: 1px solid var(--line);
  transition: background 0.12s;
  cursor: pointer;
}
.ht-row:last-child { border-bottom: none; }
.ht-row:hover { background: #f1f3f5; }
.ht-row.nova-loja { background: #f6fef9; }
.ht-row.nova-loja:hover { background: #edfaf2; }

.ht-td {
  padding: 16px 12px; display: flex; align-items: center;
  justify-content: center; border-right: 1px solid var(--line);
  font-size: 15px; color: var(--ink); font-weight: 600;
}
.ht-td:last-child { border-right: none; }
.ht-td.left { justify-content: flex-start; text-align: left; padding-left: 16px; }
.rank-td { background: #f1f3f5; }

/* ── PILLS ── */
.rank-pill {
  padding: 3px 10px; border-radius: 99px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
  text-align: center;
}
.pill-n1 { background: var(--n1-bg); color: var(--n1); }
.pill-n2 { background: var(--n2-bg); color: var(--n2); }
.pill-n3 { background: var(--n3-bg); color: var(--n3); }

/* ── PROGRESS MINI ── */
.mini-prog { flex: 1; display: flex; flex-direction: column; gap: 8px; width: 100%; }
.mini-row { display: flex; align-items: center; gap: 8px; }
.mini-track { flex: 1; height: 6px; background: var(--bar-track); border-radius: 99px; overflow: hidden; }
.mini-fill { height: 100%; border-radius: 99px; }
.fill-blue { background: var(--bar-blue); }
.fill-orange { background: var(--bar-orange); }
.mini-pct { font-size: 12px; font-weight: 700; min-width: 34px; text-align: right; }

/* ── NOVA BADGE ── */
.nova-badge { background: #e6f4ea; color: #1e7e34; border: 1px solid #1e7e34; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }

/* ── DETAIL BTN ── */
.btn-detail {
  padding: 7px 12px; border-radius: 7px; border: 1px solid var(--line-2);
  background: #fff; font-size: 12px; font-weight: 700; color: var(--ink-2);
  cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s;
}
.btn-detail:hover { background: #1c1c2e; color: #fff; border-color: #1c1c2e; }
.btn-detail svg { width: 12px; height: 12px; }

/* ── DETAIL SCREEN ── */
.detail-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: 14px; overflow: hidden; box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card-main {
  display: grid;
  grid-template-columns: 56px 220px 1fr auto;
  align-items: center;
  min-height: 88px;
}
.col-rank {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 10px; border-right: 1px solid var(--line);
  align-self: stretch; background: #f1f3f5; gap: 6px; text-align: center;
}
.rank-num { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1; color: var(--ink-2); }
.col-id {
  padding: 20px; border-right: 1px solid var(--line);
  align-self: stretch; display: flex; flex-direction: column; justify-content: center;
}
.loja-nome { font-size: 18px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.loja-code { font-size: 13px; color: var(--ink-4); margin-top: 4px; }

.col-metrics {
  display: flex; align-items: stretch;
  border-right: 1px solid var(--line); align-self: stretch;
}
.metric-group {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 16px 18px; border-right: 1px solid var(--line);
  min-width: 88px; flex: 1; gap: 3px;
}
.metric-group:last-child { border-right: none; }
.metric-group.is-total { background: #f0f2fb; }
.metric-group.is-total .mg-val { color: var(--bar-blue); }
.metric-group.is-total-np { background: #fdf3eb; }
.metric-group.is-total-np .mg-val { color: var(--bar-orange); }
.col-metrics-sep { width: 2px; background: var(--line-2); align-self: stretch; flex-shrink: 0; }
.mg-label { font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; color: var(--ink-3); white-space: nowrap; margin-bottom: 3px; }
.mg-val { font-size: 24px; font-weight: 700; color: var(--ink); line-height: 1; }

.col-right {
  display: flex; align-items: center;
  padding: 14px 22px; gap: 22px; align-self: stretch; min-width: 360px;
}
.progress-block { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.progress-row { display: flex; flex-direction: column; gap: 4px; }
.progress-label-row { display: flex; justify-content: space-between; align-items: center; }
.prog-label { font-size: 10px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-4); }
.prog-pct { font-size: 13px; font-weight: 800; color: var(--ink-2); }
.prog-track { height: 6px; border-radius: 99px; background: var(--bar-track); overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

.actions-col { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
.btn-card {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px; border: 1px solid var(--btn-border);
  border-radius: 8px; background: #fff;
  color: var(--btn-text); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  white-space: nowrap; transition: all 0.15s; min-width: 110px;
}
.btn-card:hover { background: #f1f3f5; border-color: #888; }
.btn-card.active { background: #1c1c2e; border-color: #1c1c2e; color: #fff; }
.btn-card svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.6; }
.btn-card.active svg { opacity: 1; }

/* ── PANELS ── */
.panel { display: none; }
.panel.open { display: block; }
.panel-body {
  padding: 24px 28px; border-top: 1px solid var(--line); background: #f8f9fa;
}
.panel-title {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; color: var(--ink); margin-bottom: 16px;
  padding-bottom: 10px; border-bottom: 1px solid var(--line);
}

/* ── TABS (áreas) ── */
.area-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.area-tab {
  padding: 7px 16px; border-radius: 99px; border: 1px solid var(--line-2);
  background: #fff; font-size: 13px; font-weight: 700; color: var(--ink-3);
  cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif;
}
.area-tab.on { background: var(--ink); border-color: var(--ink); color: #fff; }

/* Subárea select */
.sub-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.sub-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); white-space: nowrap; }
.sub-select {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line-2);
  background: #fff; font-size: 14px; font-weight: 600; color: var(--ink-2);
  cursor: pointer; min-width: 280px; font-family: 'DM Sans', sans-serif;
}

/* Vals grid */
.vals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.val-card {
  background: #fff; border: 1px solid var(--line); border-radius: 10px;
  padding: 20px 16px; text-align: center;
}
.val-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--ink-4); margin-bottom: 6px; }
.val-num { font-family: 'DM Serif Display', serif; font-size: 42px; color: var(--ink); line-height: 1; }

/* Chart wrapper */
.chart-wrap {
  position: relative; width: 100%; background: #fff;
  border: 1px solid var(--line); border-radius: 12px;
  padding: 20px; margin-bottom: 0;
  box-shadow: var(--shadow);
}
.chart-legend {
  display: flex; gap: 24px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--line); flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--ink-3); }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

/* Bottom legend bar */
.legend-bar {
  display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  padding: 10px 16px; background: #fff;
  border: 1px solid var(--line); border-radius: 10px;
  font-size: 13px; color: var(--ink-3); margin-top: 16px;
}
.legend-bar .legend-item { font-weight: 600; }
.legend-sep { width: 1px; height: 16px; background: var(--line-2); }

/* Bottom action banner */
.bottom-bar { margin-top: 20px; display: flex; gap: 14px; flex-wrap: wrap; }
.level-legend {
  flex: 1; min-width: 240px; background: #fff;
  border: 1px solid var(--line); border-radius: 12px; padding: 16px 20px; box-shadow: var(--shadow);
}
.level-legend-title { font-size: 11px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 12px; }
.level-items { display: flex; flex-direction: column; gap: 12px; }
.level-item-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink-2); font-weight: 600; }
.level-dot { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.action-banner {
  flex: 2; min-width: 260px; background: #fff8f4; border: 1px solid #f0d8c8;
  border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 14px;
}
.action-icon { width: 38px; height: 38px; border-radius: 9px; background: #e8924a; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.action-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
.action-desc { font-size: 13px; color: var(--ink-3); line-height: 1.4; font-weight: 600; }

.loading { padding: 60px; text-align: center; font-size: 16px; font-weight: 600; color: var(--ink-4); }

/* Screens */
.home-screen, .detail-screen { display: none; }
.home-screen.active, .detail-screen.active { display: block; }

@media (max-width: 1024px) {
  .ht-head, .ht-row { grid-template-columns: 60px 180px 1fr 1fr 140px 90px 110px; }
  .ht-th, .ht-td { font-size: 12px; padding: 12px 6px; }
  .vals-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="btn-back" id="btn-back" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Voltar
    </button>
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="13" width="4" height="8" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="17" y="5" width="4" height="16" rx="1"/></svg>
    </div>
    <div>
      <div class="header-title" id="header-title">Monitorização HACCP</div>
      <div class="header-subtitle" id="sub-info">A carregar…</div>
    </div>
  </div>
</header>

<main class="main">
  <div id="home-screen" class="home-screen">
    <div class="loading">A carregar dados…</div>
  </div>
  <div id="detail-screen" class="detail-screen">
    <div id="detail-app"></div>
  </div>
</main>

<script>
var _lojas = [];
var _activeFilter = 'all';
var _chartInstance = null;
var _currentLojaIdx = null;
var _currentAreaIdx = 0;
var _currentSubareaIdx = 0;
var _panelH = {}, _panelS = {};
var _areaCharts = {};

function fmt(n) { return Number(n||0).toLocaleString('pt-PT'); }
function pillCls(nivel) {
  if (!nivel) return 'pill-n1';
  var n = String(nivel).toUpperCase();
  return n === 'N1' ? 'pill-n1' : n === 'N2' ? 'pill-n2' : 'pill-n3';
}
function svgArrow() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
}
function svgFolder() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
}
function svgLayers() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>';
}

/* ── Load ── */
fetch('dados.json?t=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(json) { processData(json); })
  .catch(function() {
    fetch('Dados.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(json) { processData(json); })
      .catch(function(e) {
        document.getElementById('home-screen').innerHTML = '<div class="loading" style="color:#b83232">Erro ao carregar dados. Verifique se o ficheiro dados.json existe.</div>';
        document.getElementById('home-screen').classList.add('active');
      });
  });

function processData(json) {
  _lojas = json.lojas || [];
  document.getElementById('sub-info').textContent = _lojas.length + ' lojas';
  renderHome();
}

/* ── Navigation ── */
function goHome() {
  document.getElementById('home-screen').classList.add('active');
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('btn-back').classList.remove('visible');
  document.getElementById('header-title').textContent = 'Monitorização HACCP';
  document.getElementById('sub-info').textContent = _lojas.length + ' lojas';
}

function goDetail(idx) {
  _currentLojaIdx = idx;
  _currentAreaIdx = 0;
  _currentSubareaIdx = 0;
  _panelH = {}; _panelS = {};
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('detail-screen').classList.add('active');
  document.getElementById('btn-back').classList.add('visible');
  var l = _lojas[idx];
  document.getElementById('header-title').textContent = l.nome;
  document.getElementById('sub-info').textContent = 'Detalhe da loja · ' + (l.nivel || '—');
  renderDetail(idx);
  window.scrollTo(0, 0);
}

/* ── HOME ── */
function renderHome() {
  var lojas = _lojas;
  var n1 = lojas.filter(function(l){ return (l.nivel||'').toUpperCase()==='N1'; }).length;
  var n2 = lojas.filter(function(l){ return (l.nivel||'').toUpperCase()==='N2'; }).length;
  var n3 = lojas.filter(function(l){ return (l.nivel||'').toUpperCase()==='N3'; }).length;
  var novas = lojas.filter(function(l){ return l.isNova; }).length;

  var html = '';

  /* Stats */
  html += '<div class="home-stats">';
  html += statCard('Total de Lojas', lojas.length, 'Esta semana', '');
  html += statCard('Nível 1', n1, '0–20% prog. fechadas', 'accent-red');
  html += statCard('Nível 2', n2, '21–40% prog. fechadas', 'accent-amber');
  html += statCard('Nível 3', n3, '41–50% prog. fechadas', 'accent-yellow');
  html += statCard('Entradas Novas', novas, 'Novas esta semana', novas > 0 ? 'accent-blue' : '');
  html += '</div>';

  /* Filter bar */
  html += '<div class="filter-bar">';
  html += '<span class="filter-label">Mostrar:</span>';
  html += '<button class="filter-btn active" data-filter="all" onclick="setFilter(\'all\')">Todas ('+lojas.length+')</button>';
  html += '<div class="filter-divider"></div>';
  html += '<button class="filter-btn" data-filter="n1" onclick="setFilter(\'n1\')">🔴 N1 ('+n1+')</button>';
  html += '<button class="filter-btn" data-filter="n2" onclick="setFilter(\'n2\')">🟠 N2 ('+n2+')</button>';
  html += '<button class="filter-btn" data-filter="n3" onclick="setFilter(\'n3\')">🟡 N3 ('+n3+')</button>';
  if (novas > 0) html += '<button class="filter-btn" data-filter="nova" onclick="setFilter(\'nova\')">✦ Novas ('+novas+')</button>';
  html += '</div>';

  /* Table */
  html += '<div class="home-table">';
  html += '<div class="ht-head">';
  html += '<div class="ht-th">#</div>';
  html += '<div class="ht-th left">Loja</div>';
  html += '<div class="ht-th">P Tarefas</div>';
  html += '<div class="ht-th">NP Tarefas</div>';
  html += '<div class="ht-th">Prog. P vs NP</div>';
  html += '<div class="ht-th">Estado</div>';
  html += '<div class="ht-th">Detalhe</div>';
  html += '</div>';
  html += '<div id="ht-body"></div>';
  html += '</div>';

  /* Bottom */
  html += '<div class="bottom-bar">';
  html += '<div class="level-legend"><div class="level-legend-title">Classificação de Nível</div><div class="level-items">';
  html += '<div class="level-item-row"><div class="level-dot pill-n1">N1</div><span>0–20% prog. fechadas</span></div>';
  html += '<div class="level-item-row"><div class="level-dot pill-n2">N2</div><span>21–40% prog. fechadas</span></div>';
  html += '<div class="level-item-row"><div class="level-dot pill-n3">N3</div><span>41–50% prog. fechadas</span></div>';
  html += '</div></div>';
  html += '<div class="action-banner"><div class="action-icon">⚠</div><div><div class="action-title">Ação Recomendada</div><div class="action-desc">Contactar urgentemente responsáveis das lojas N1 e N2. Clique em "Detalhe" para ver áreas e subáreas.</div></div></div>';
  html += '</div>';

  document.getElementById('home-screen').innerHTML = html;
  document.getElementById('home-screen').classList.add('active');
  renderHomeTable();
}

function statCard(label, val, sub, accent) {
  return '<div class="stat-card '+(accent||'')+'">'
    +'<div class="stat-card-label">'+label+'</div>'
    +'<div class="stat-card-val">'+val+'</div>'
    +'<div class="stat-card-sub">'+sub+'</div>'
    +'</div>';
}

function setFilter(f) {
  _activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderHomeTable();
}

function renderHomeTable() {
  var lojas = _lojas;
  var f = _activeFilter;
  var filtered = lojas.filter(function(l) {
    var nivel = (l.nivel||'').toUpperCase();
    if (f === 'n1')   return nivel === 'N1';
    if (f === 'n2')   return nivel === 'N2';
    if (f === 'n3')   return nivel === 'N3';
    if (f === 'nova') return l.isNova;
    return true;
  });

  var html = '';
  if (filtered.length === 0) {
    html = '<div style="padding:32px;text-align:center;color:var(--ink-4);font-size:13px">Sem lojas para este filtro.</div>';
  } else {
    filtered.forEach(function(l) {
      var li = lojas.indexOf(l);
      var pc = pillCls(l.nivel);
      var p = l.totaisGlobais || {};
      var pT = p.pTotal || 0, pA = p.pAberto || 0, pF = p.pFechado || 0;
      var nT = p.npTotal || 0, nA = p.npAberto || 0, nF = p.npFechado || 0;
      var pctP = pT > 0 ? Math.round(pF / pT * 100) : 0;
      var pctNP = nT > 0 ? Math.round(nF / nT * 100) : 0;
      var taxa = l.taxa || pctP;

      html += '<div class="ht-row'+(l.isNova?' nova-loja':'')+'" onclick="goDetail('+li+')">';

      /* rank */
      html += '<div class="ht-td rank-td" style="flex-direction:column;gap:6px;align-items:center;background:#f1f3f5">';
      html += '<div style="font-family:\'DM Serif Display\',serif;font-size:26px;font-weight:400;color:var(--ink-2);line-height:1">'+(li+1)+'</div>';
      html += '<div class="rank-pill '+pc+'">'+(l.nivel||'—')+'</div>';
      html += '</div>';

      /* identity */
      html += '<div class="ht-td left" style="flex-direction:column;align-items:flex-start;gap:3px">';
      html += '<div style="font-weight:700;font-size:15px">'+l.nome+'</div>';
      html += '</div>';

      /* P metrics */
      html += '<div class="ht-td" style="flex-direction:column;gap:3px">';
      html += '<div style="font-size:12px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;color:var(--ink-4)">Total '+fmt(pT)+'</div>';
      html += '<div style="font-size:13px;color:var(--ink-3)">'+fmt(pA)+' abertas · '+fmt(pF)+' fechadas</div>';
      html += '</div>';

      /* NP metrics */
      html += '<div class="ht-td" style="flex-direction:column;gap:3px">';
      html += '<div style="font-size:12px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;color:var(--ink-4)">Total '+fmt(nT)+'</div>';
      html += '<div style="font-size:13px;color:var(--ink-3)">'+fmt(nA)+' abertas · '+fmt(nF)+' fechadas</div>';
      html += '</div>';

      /* progress */
      html += '<div class="ht-td"><div class="mini-prog">';
      html += '<div class="mini-row">'
        +'<span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-4);min-width:22px">P</span>'
        +'<div class="mini-track"><div class="mini-fill fill-blue" style="width:'+pctP+'%"></div></div>'
        +'<span class="mini-pct" style="color:var(--bar-blue)">'+pctP+'%</span>'
        +'</div>';
      html += '<div class="mini-row">'
        +'<span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-4);min-width:22px">NP</span>'
        +'<div class="mini-track"><div class="mini-fill fill-orange" style="width:'+pctNP+'%"></div></div>'
        +'<span class="mini-pct" style="color:var(--bar-orange)">'+pctNP+'%</span>'
        +'</div>';
      html += '</div></div>';

      /* nova badge */
      html += '<div class="ht-td">';
      if (l.isNova) html += '<span class="nova-badge">✦ Nova</span>';
      html += '</div>';

      /* detail btn */
      html += '<div class="ht-td" onclick="event.stopPropagation()">';
      html += '<button class="btn-detail" onclick="goDetail('+li+')">Detalhe '+svgArrow()+'</button>';
      html += '</div>';

      html += '</div>';
    });
  }
  document.getElementById('ht-body').innerHTML = html;
}

/* ── DETAIL ── */
function renderDetail(idx) {
  var l = _lojas[idx];
  if (!l) return;
  var p = l.totaisGlobais || {};
  var pT = p.pTotal||0, pA = p.pAberto||0, pF = p.pFechado||0;
  var nT = p.npTotal||0, nA = p.npAberto||0, nF = p.npFechado||0;
  var pctP  = pT > 0 ? Math.round(pF/pT*100) : 0;
  var pctNP = nT > 0 ? Math.round(nF/nT*100) : 0;
  var pc = pillCls(l.nivel);

  var html = '<div class="detail-card">';
  html += '<div class="card-main">';

  /* rank */
  html += '<div class="col-rank"><div class="rank-num">'+(idx+1)+'</div><div class="rank-pill '+pc+'">'+(l.nivel||'—')+'</div></div>';

  /* identity */
  html += '<div class="col-id"><div class="loja-nome">'+l.nome+'</div><div class="loja-code">Taxa prog.: '+(l.taxa||pctP)+'%</div></div>';

  /* metrics */
  html += '<div class="col-metrics">';
  var gP = [{label:'P Total',val:fmt(pT),cls:'is-total'},{label:'P Abertas',val:fmt(pA),cls:''},{label:'P Fechadas',val:fmt(pF),cls:''}];
  gP.forEach(function(g){ html += '<div class="metric-group '+g.cls+'"><div class="mg-label">'+g.label+'</div><div class="mg-val">'+g.val+'</div></div>'; });
  html += '<div class="col-metrics-sep"></div>';
  var gNP = [{label:'NP Total',val:fmt(nT),cls:'is-total-np'},{label:'NP Abertas',val:fmt(nA),cls:''},{label:'NP Fechadas',val:fmt(nF),cls:''}];
  gNP.forEach(function(g){ html += '<div class="metric-group '+g.cls+'"><div class="mg-label">'+g.label+'</div><div class="mg-val">'+g.val+'</div></div>'; });
  html += '</div>';

  /* right: progress + actions */
  html += '<div class="col-right">';
  html += '<div class="progress-block">';
  html += '<div class="progress-row"><div class="progress-label-row"><span class="prog-label">Programadas</span><span class="prog-pct">'+pctP+'%</span></div><div class="prog-track"><div class="prog-fill fill-blue" style="width:'+pctP+'%"></div></div></div>';
  html += '<div class="progress-row"><div class="progress-label-row"><span class="prog-label">Não Prog.</span><span class="prog-pct">'+pctNP+'%</span></div><div class="prog-track"><div class="prog-fill fill-orange" style="width:'+pctNP+'%"></div></div></div>';
  html += '</div>';
  html += '<div class="actions-col">';
  html += '<button class="btn-card" id="bs-'+idx+'" onclick="toggleAreas('+idx+')">'+svgLayers()+'Áreas</button>';
  html += '</div>';
  html += '</div>'; /* col-right */

  html += '</div>'; /* card-main */

  /* Areas panel */
  html += '<div class="panel" id="ps-'+idx+'"><div class="panel-body">';
  if (l.areas && l.areas.length > 0) {
    html += '<div class="panel-title">Áreas · '+l.nome+'</div>';
    /* Area tabs */
    html += '<div class="area-tabs" id="area-tabs-'+idx+'">';
    l.areas.forEach(function(a, ai) {
      html += '<button class="area-tab'+(ai===0?' on':'')+'" onclick="selectArea('+idx+','+ai+')">'+a.area+'</button>';
    });
    html += '</div>';
    /* Subarea content */
    html += '<div id="subarea-wrap-'+idx+'">'+buildSubareaHTML(l, 0, 0, idx)+'</div>';
  } else {
    html += '<p style="color:var(--ink-4);font-size:14px">Sem áreas disponíveis para esta loja.</p>';
  }
  html += '</div></div>';

  html += '</div>'; /* detail-card */

  /* Legend */
  html += '<div class="legend-bar">';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--bar-blue)"></div><span style="font-weight:700">P</span> = Tarefas Programadas</div>';
  html += '<div class="legend-sep"></div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--bar-orange)"></div><span style="font-weight:700">NP</span> = Tarefas Não Programadas</div>';
  html += '</div>';

  document.getElementById('detail-app').innerHTML = html;
}

function toggleAreas(idx) {
  _panelS[idx] = !_panelS[idx];
  var p = document.getElementById('ps-'+idx);
  var b = document.getElementById('bs-'+idx);
  if (p) p.classList.toggle('open', _panelS[idx]);
  if (b) b.classList.toggle('active', _panelS[idx]);
  if (_panelS[idx]) {
    setTimeout(function() { buildSubareaChart(idx, _currentAreaIdx, _currentSubareaIdx); }, 150);
  }
}

function selectArea(lojaIdx, areaIdx) {
  _currentAreaIdx = areaIdx;
  _currentSubareaIdx = 0;
  /* Update tab styles */
  var tabs = document.querySelectorAll('#area-tabs-'+lojaIdx+' .area-tab');
  tabs.forEach(function(t, i) { t.classList.toggle('on', i === areaIdx); });
  /* Rebuild subarea */
  var wrap = document.getElementById('subarea-wrap-'+lojaIdx);
  if (wrap) {
    if (_areaCharts['sub-'+lojaIdx]) { _areaCharts['sub-'+lojaIdx].destroy(); delete _areaCharts['sub-'+lojaIdx]; }
    wrap.innerHTML = buildSubareaHTML(_lojas[lojaIdx], areaIdx, 0, lojaIdx);
    setTimeout(function() { buildSubareaChart(lojaIdx, areaIdx, 0); }, 150);
  }
}

function selectSubarea(lojaIdx, val) {
  _currentSubareaIdx = Number(val);
  var l = _lojas[lojaIdx];
  var wrap = document.getElementById('subarea-wrap-'+lojaIdx);
  if (wrap) {
    if (_areaCharts['sub-'+lojaIdx]) { _areaCharts['sub-'+lojaIdx].destroy(); delete _areaCharts['sub-'+lojaIdx]; }
    wrap.innerHTML = buildSubareaHTML(l, _currentAreaIdx, _currentSubareaIdx, lojaIdx);
    setTimeout(function() { buildSubareaChart(lojaIdx, _currentAreaIdx, _currentSubareaIdx); }, 150);
  }
}

function buildSubareaHTML(l, areaIdx, subIdx, lojaIdx) {
  var area = l.areas && l.areas[areaIdx];
  if (!area || !area.subareas || area.subareas.length === 0) return '<p style="color:var(--ink-4);font-size:14px">Sem subáreas nesta área.</p>';
  var sub = area.subareas[subIdx] || area.subareas[0];

  var html = '<div class="sub-row">';
  html += '<span class="sub-lbl">Subárea:</span>';
  html += '<select class="sub-select" onchange="selectSubarea('+lojaIdx+', this.value)">';
  area.subareas.forEach(function(s, i) {
    html += '<option value="'+i+'"'+(i===subIdx?' selected':'')+'>'+s.subarea+'</option>';
  });
  html += '</select></div>';

  html += '<div class="vals-grid">';
  html += valCard('Total', fmt(sub.total), '');
  html += valCard('P. Abertas', fmt(sub.pAberto), 'color:var(--n1)');
  html += valCard('P. Fechadas', fmt(sub.pFechado), 'color:var(--bar-blue)');
  html += valCard('NP. Abertas', fmt(sub.npAberto), 'color:var(--n2)');
  html += '</div>';

  html += '<div class="chart-wrap">';
  html += '<div style="font-size:13px;font-weight:700;color:var(--ink-3);margin-bottom:14px">📊 Tarefas por categoria</div>';
  html += '<canvas id="subChart-'+lojaIdx+'" style="max-height:200px"></canvas>';
  html += '<div class="chart-legend">';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--bar-blue)"></div>Programadas</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--bar-orange)"></div>Não Programadas</div>';
  html += '</div></div>';

  return html;
}

function valCard(label, val, style) {
  return '<div class="val-card"><div class="val-lbl">'+label+'</div><div class="val-num" style="'+style+'">'+val+'</div></div>';
}

function buildSubareaChart(lojaIdx, areaIdx, subIdx) {
  var l = _lojas[lojaIdx];
  if (!l || !l.areas) return;
  var area = l.areas[areaIdx];
  if (!area || !area.subareas) return;
  var sub = area.subareas[subIdx] || area.subareas[0];
  if (!sub) return;

  var canvas = document.getElementById('subChart-'+lojaIdx);
  if (!canvas) return;

  if (_areaCharts['sub-'+lojaIdx]) { _areaCharts['sub-'+lojaIdx].destroy(); delete _areaCharts['sub-'+lojaIdx]; }

  _areaCharts['sub-'+lojaIdx] = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    plugins: [ChartDataLabels],
    data: {
      labels: ['Fechadas', 'Abertas'],
      datasets: [
        {
          label: 'Programadas',
          data: [sub.pFechado || 0, sub.pAberto || 0],
          backgroundColor: 'rgba(43,47,216,.8)',
          borderRadius: 4,
          borderWidth: 0,
          barPercentage: 0.6,
          categoryPercentage: 0.7
        },
        {
          label: 'Não Programadas',
          data: [sub.npFechado || 0, sub.npAberto || 0],
          backgroundColor: 'rgba(216,114,42,.85)',
          borderRadius: 4,
          borderWidth: 0,
          barPercentage: 0.6,
          categoryPercentage: 0.7
        }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: true,
      layout: { padding: { right: 50, top: 8, bottom: 4, left: 4 } },
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: 'end',
          formatter: function(v) { return v; },
          font: { size: 14, weight: '700', family: 'DM Sans' },
          color: '#1a1a1a',
          offset: 4
        },
        tooltip: {
          callbacks: {
            label: function(c) { return ' ' + c.dataset.label + ': ' + c.parsed.x; }
          }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          ticks: { font: { size: 12, weight: '600' }, stepSize: 1 },
          grid: { color: 'rgba(0,0,0,.06)' },
          title: { display: true, text: 'Nº de Tarefas', color: '#777', font: { size: 12, weight: '700' } }
        },
        y: {
          ticks: { font: { size: 14, weight: '700', family: 'DM Sans' }, color: '#1a1a1a' },
          grid: { display: false }
        }
      }
    }
  });
}
</script>
</body>
</html>
